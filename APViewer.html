<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA - AP Case Viewer v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1923;color:#e0eaf5;font-size:14px;}
.header{background:#0d1520;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2e40;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{font-size:11px;color:#4caf50;letter-spacing:1px;}
.ap-text{font-size:11px;color:#8fa8c0;letter-spacing:2px;text-transform:uppercase;}
.toolbar{display:flex;gap:6px;padding:10px 12px;align-items:center;flex-wrap:wrap;background:#131f2e;border-bottom:1px solid #1e2e40;}
input[type=text],select{padding:6px 10px;border:1px solid #2d3f55;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#1a2535;color:#e0eaf5;}
input[type=text]:focus,select:focus{border-color:#3a7bd5;}
input[type=date]{padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#1a2535;color:#e0eaf5;}
button{padding:5px 12px;border:1px solid #2d3f55;border-radius:6px;background:#1a2535;font-size:12px;cursor:pointer;font-family:inherit;color:#c0d4e8;}
button:hover{background:#243447;}
.btn-primary{background:#3a7bd5;color:#fff;border-color:#3a7bd5;}
.btn-primary:hover{background:#2d6abf;}
.btn-small{font-size:11px;padding:3px 10px;}
.main{display:flex;height:calc(100vh - 108px);}
.resizer{width:5px;background:#1e2e40;cursor:col-resize;flex-shrink:0;transition:background .15s;}
.resizer:hover,.resizer.dragging{background:#3a7bd5;}
.list{width:310px;min-width:310px;overflow-y:auto;border-right:1px solid #1e2e40;background:#111c2a;}
.list-item{padding:10px 14px;border-bottom:1px solid #1a2535;cursor:pointer;}
.list-item:hover{background:#1a2d42;}
.list-item.active{background:#1e3a5f;border-left:3px solid #3a7bd5;}
.list-item.hr-item{border-left:3px solid #c8960c;}
.list-item.hr-item.active{background:#2a1e00;border-left:3px solid #e0a030;}
.badge-hr{background:#2a1a00;color:#e0a030;border:1px solid #8a5a00;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;}
.item-name{font-size:12px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e0eaf5;}
.item-caseid{font-size:11px;color:#5a9fd4;font-weight:500;margin-bottom:5px;}
.item-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;}
.item-meta span{font-size:10px;color:#7a9ab8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta .lbl{color:#4a6a8a;}
.detail{flex:1;overflow-y:auto;padding:14px;min-width:0;background:#0f1923;}
.card{background:#131f2e;border-radius:10px;border:1px solid #1e2e40;padding:16px 18px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:15px;font-weight:600;color:#e0eaf5;}
.card-caseid{font-size:11px;color:#4a6a8a;margin-top:2px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.bg-green{background:#1a3a2a;color:#4caf80;}
.bg-orange{background:#2a2010;color:#e0a030;}
.bg-red{background:#3a1a1a;color:#e05050;}
.bg-gray{background:#1e2e40;color:#8fa8c0;}
.bg-blue{background:#1a2a4a;color:#5a9fd4;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#5a9fd4;text-transform:uppercase;letter-spacing:.09em;padding-bottom:4px;border-bottom:2px solid #1e3a5f;margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px 16px;}
.f{margin-bottom:2px;}
.f.full{grid-column:1/-1;}
.f.half{grid-column:span 2;}
.flabel{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fval{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;color:#c0d4e8;}
.fedit textarea{width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-family:inherit;resize:vertical;line-height:1.6;background:#0f1923;color:#e0eaf5;}
.fedit input[type=text]{width:100%;font-size:12px;}
.fedit-actions{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.save-msg{font-size:11px;}
.save-msg.ok{color:#4caf80;}
.save-msg.err{color:#e05050;}
.vr-card{background:#0d1520;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #1e2e40;}
.vr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.vr-agency{font-size:13px;font-weight:600;color:#e0eaf5;}
.vr-sub{font-size:11px;color:#4a6a8a;margin-top:1px;}
.vr-right{display:flex;gap:5px;align-items:center;}
.vr-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.1);color:#c0d4e8;}
.vr-expand{font-size:11px;padding:3px 9px;background:transparent;border:1px solid #c0392b;color:#e07070;border-radius:4px;cursor:pointer;}
.vr-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
.vrf-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.vrf-val{font-size:12px;color:#c0d4e8;line-height:1.5;white-space:pre-wrap;}
.vrf.full{grid-column:1/-1;}
.ds-card{background:#2a1010;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #4a1a1a;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#131f2e;border-radius:12px;padding:18px 22px;max-width:640px;width:92%;max-height:82vh;overflow-y:auto;border:1px solid #1e2e40;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-title{font-size:14px;font-weight:600;color:#e0eaf5;}
.modal-sub{font-size:11px;color:#4a6a8a;margin-top:1px;}
.mfields{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
.mf{margin-bottom:2px;}
.mf.full{grid-column:1/-1;}
.mf-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.mf-val{font-size:13px;line-height:1.7;white-space:pre-wrap;color:#c0d4e8;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#4a6a8a;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid #1e2e40;border-top-color:#3a7bd5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#4a6a8a;font-size:13px;}
.err-msg{padding:16px;color:#e05050;font-size:13px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:#0d1520;border-bottom:1px solid #1e2e40;}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#0d1520;border-bottom:1px solid #1e2e40;align-items:center;}
.status-bar-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
.sbutton{font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1.5px solid #2d3f55;background:#1a2535;font-family:inherit;font-weight:500;transition:all .15s;color:#c0d4e8;}
.sbutton.active-green{background:#e6f4ec;color:#1a7a3f;border-color:#1a7a3f;}
.sbutton.active-red{background:#fdecea;color:#c0392b;border-color:#c0392b;}
.sbutton.active-blue{background:#e6f0fb;color:#1a5fa8;border-color:#1a5fa8;}
.sbutton.active-orange{background:#fff8e6;color:#b07800;border-color:#b07800;}
.settings-panel{background:#0d1520;border-bottom:1px solid #1e2e40;padding:14px 18px;display:none;}
.settings-panel.open{display:block;}
.settings-tabs{display:flex;gap:4px;margin-bottom:12px;}
.stab{padding:5px 14px;border:1px solid #2d3f55;border-radius:6px;background:#1a2535;font-size:12px;cursor:pointer;font-family:inherit;color:#c0d4e8;}
.stab.active{background:#3a7bd5;color:#fff;border-color:#3a7bd5;}
.stab-content{display:none;}
.stab-content.active{display:block;}
.settings-row{display:flex;flex-wrap:wrap;gap:8px;}
.settings-check{display:flex;align-items:center;gap:5px;font-size:12px;background:#1a2535;border:1px solid #2d3f55;border-radius:6px;padding:4px 10px;cursor:pointer;color:#c0d4e8;}
.settings-check input{margin:0;}
.drag-list{display:flex;flex-direction:column;gap:6px;max-width:400px;}
.drag-item{display:flex;align-items:center;gap:8px;background:#1a2535;border:1px solid #2d3f55;border-radius:6px;padding:7px 12px;cursor:grab;font-size:12px;user-select:none;color:#c0d4e8;}
.drag-item:active{cursor:grabbing;}
.drag-item.dragging{opacity:.4;border-style:dashed;}
.drag-item.drag-over{border-color:#3a7bd5;background:#e8f0fb;}
.drag-handle{color:#bbb;font-size:14px;cursor:grab;}
.drag-item input{margin:0;}
.status-dropdown{position:relative;display:inline-block;}
.status-dropdown-menu{position:absolute;top:100%;left:0;z-index:200;background:#131f2e;border:1px solid #2d3f55;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);min-width:220px;padding:4px 0;margin-top:4px;display:none;}
.status-dropdown-menu.open{display:block;}
.status-option{padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;color:#c0d4e8;}
.status-option:hover{background:#1e3a5f;}
.status-option.current{font-weight:600;color:#5a9fd4;}
.status-saving{font-size:11px;color:#4a6a8a;padding:7px 14px;}
.preview-panel{width:500px;min-width:500px;border-left:1px solid #1a2535;background:#1a2535;display:flex;flex-direction:column;overflow:hidden;}
.preview-header{padding:10px 14px;font-size:11px;font-weight:700;color:#8fa8c0;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #243447;background:#1a2535;display:flex;justify-content:space-between;align-items:center;}
.preview-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.preview-thumb{border-radius:6px;overflow:hidden;background:#243447;cursor:pointer;position:relative;}
.preview-thumb img{width:100%;max-height:400px;object-fit:contain;background:#0d1520;display:block;}
.preview-thumb:hover img{opacity:.85;}
.preview-thumb-label{font-size:11px;color:#8fa8c0;padding:5px 8px;background:#1e2e40;}
.preview-doc{border-radius:6px;border:1px solid #2d3f55;background:#243447;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.preview-doc:hover{background:#2d4a6a;}
.preview-doc-icon{font-size:26px;flex-shrink:0;}
.preview-doc-info{flex:1;min-width:0;}
.preview-doc-name{font-size:12px;font-weight:500;color:#e0eaf5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.preview-doc-sub{font-size:10px;color:#6a8aaa;margin-top:2px;}
.preview-empty{text-align:center;color:#4a6a8a;font-size:12px;padding:40px 20px;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lightbox-img{max-width:85vw;max-height:75vh;width:auto;height:auto;border-radius:6px;object-fit:contain;}
.lightbox-nav{display:flex;align-items:center;gap:20px;margin-top:16px;}
.lightbox-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-btn:hover{background:rgba(255,255,255,.3);}
.lightbox-counter{color:#aaa;font-size:12px;min-width:60px;text-align:center;}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;">
    <img src="RUSALogo.png" alt="Range USA" style="height:120px;object-fit:contain;" onerror="this.style.display='none'"/>
  </div>
  <div class="header-right">
    <span class="live-badge" id="live-badge">● Loading…</span>
    <a href="index.html" style="font-size:11px;padding:4px 12px;background:transparent;border:1px solid #2d3f55;color:#8fa8c0;border-radius:6px;cursor:pointer;text-decoration:none;">🏠 Home</a>
    <button onclick="refreshAll()" style="font-size:10px;padding:3px 8px;background:transparent;border:1px solid #4a6a8a;color:#8fa8c0;border-radius:4px;cursor:pointer;">↺ Sync</button>
  </div>
</div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Search case ID, name, branch..." oninput="renderList()" style="flex:1;min-width:160px;"/>
  <button onclick="toggleSettings()" style="font-size:12px;">⚙ Settings</button>
</div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-tabs">
    <button class="stab active" onclick="switchTab('tab-sections')">Section Order</button>
    <button class="stab" onclick="switchTab('tab-fields')">Visible Fields</button>
  </div>
  <div id="tab-sections" class="stab-content active">
    <div style="font-size:11px;color:#888;margin-bottom:10px;">Drag to reorder sections. Uncheck to hide.</div>
    <div class="drag-list" id="section-drag-list"></div>
  </div>
  <div id="tab-fields" class="stab-content">
    <div style="font-size:11px;color:#888;margin-bottom:8px;">Toggle which fields appear in the case detail view</div>
    <div class="settings-row" id="field-toggles"></div>
  </div>
</div>
<div class="filter-row">
  <select id="f-branch" onchange="renderList()"><option value="">All branches</option></select>
  <select id="f-category" onchange="renderList()"><option value="">All categories</option></select>
  <select id="f-type" onchange="renderList()"><option value="">All types</option></select>
  <select id="f-ap" onchange="renderList()">
    <option value="">All AP actions</option>
    <option value="YES - AP ACTION NEEDED">AP Action Needed</option>
    <option value="AP Review Completed">AP Review Completed</option>
    <option value="No - AP Action is not needed">No AP Action Needed</option>
  </select>
  <select id="f-hr" onchange="renderList()">
    <option value="">All HR</option>
    <option value="Termination">Termination</option>
    <option value="Final Written">Final Written</option>
    <option value="Written Warning">Written Warning</option>
  </select>
  <select id="f-retain" onchange="renderList()">
    <option value="">All retain video</option>
    <option value="yes">Yes - Retain</option>
    <option value="no">No</option>
  </select>
  <select id="f-deny" onchange="renderList()">
    <option value="">All deny service</option>
    <option value="has">Has DNS record</option>
    <option value="none">No DNS record</option>
  </select>
  <input type="date" id="f-date-from" onchange="renderList()" title="Date from"/>
  <input type="date" id="f-date-to" onchange="renderList()" title="Date to"/>
  <button onclick="clearFilters()" class="btn-small">Clear filters</button>
  <button onclick="loadOlderCases()" class="btn-small" id="btn-load-older" style="color:#3a7bd5;border-color:#3a7bd5;" title="Select a branch filter first">Load older (select branch first)</button>
  <span id="cache-badge" style="font-size:10px;color:#aaa;"></span>
</div>
<div id="status-bar" class="status-bar" style="display:none;">
  <span class="status-bar-label">Quick actions:</span>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-ap" onclick="toggleStatusDropdown('dd-ap',event)">AP Follow-up: —</button>
    <div class="status-dropdown-menu" id="dd-ap"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-category" onclick="toggleStatusDropdown('dd-category',event)">Category: —</button>
    <div class="status-dropdown-menu" id="dd-category"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-video" onclick="toggleStatusDropdown('dd-video',event)">Video: —</button>
    <div class="status-dropdown-menu" id="dd-video"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-deny" onclick="toggleStatusDropdown('dd-deny',event)">Deny Service: —</button>
    <div class="status-dropdown-menu" id="dd-deny"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-hr" onclick="toggleStatusDropdown('dd-hr',event)">HR Review: —</button>
    <div class="status-dropdown-menu" id="dd-hr"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-hrrec" onclick="toggleStatusDropdown('dd-hrrec',event)">HR Rec: —</button>
    <div class="status-dropdown-menu" id="dd-hrrec"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-handshake" onclick="toggleStatusDropdown('dd-handshake',event)">Rich Handshake: —</button>
    <div class="status-dropdown-menu" id="dd-handshake"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-ownership" onclick="toggleStatusDropdown('dd-ownership',event)">Ownership: —</button>
    <div class="status-dropdown-menu" id="dd-ownership"></div>
  </div>
</div>
<div class="main">
  <div class="list" id="list-panel">
    <div class="loading"><div class="spinner"></div><span>Loading cases...</span></div>
  </div>
  <div class="resizer" id="resizer-left" title="Drag to resize · Double-click to reset"></div>
  <div class="detail" id="detail-panel">
    <div class="empty">Select a case from the list</div>
  </div>
  <div class="resizer" id="resizer-right" title="Drag to resize · Double-click to reset"></div>
  <div class="preview-panel" id="preview-panel">
    <div class="preview-header">
      <span>Files &amp; Media</span>
      <span id="preview-count" style="font-size:10px;color:#aaa;font-weight:400;"></span>
    </div>
    <div class="preview-body" id="preview-body">
      <div class="preview-empty">Select a case to preview files</div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="vr-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="vr-modal-content"></div>
</div>
<div class="lightbox" id="lightbox" style="display:none">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="" style="max-width:85vw;max-height:75vh;width:auto;height:auto;border-radius:6px;object-fit:contain;"/>
  <div class="lightbox-nav">
    <button class="lightbox-btn" onclick="lightboxNav(-1)">&#8249;</button>
    <span class="lightbox-counter" id="lightbox-counter"></span>
    <button class="lightbox-btn" onclick="lightboxNav(1)">&#8250;</button>
  </div>
</div>

async function gql(query) {
  const r = await fetch("https://radius-revelation-ward-chicago.trycloudflare.com/api/monday", {method:"POST",headers:{"Content-Type":"application/json","x-api-key":"rusa-ap-2026"},body:JSON.stringify({query:q}),
    body:JSON.stringify({query})
  });
  return r.json();
}

function getVal(cols, id) {
  const c = cols.find(x => x.id === id);
  if (!c) return "";
  // File columns — return raw JSON string for later parsing
  if (id === "files" || id === "files9") return c.value || "";
  // Board relation columns — return raw value for linked ID extraction
  if (id === "board_relation_mm2kcgyg") return c.value || "";
  try {
    const v = JSON.parse(c.value);
    if (v === null) return "";
    if (typeof v === "string") return v;
    if (v.text) return v.text;
    if (v.name) return v.name;
    if (Array.isArray(v)) return v.map(x => x.name||x).join(", ");
    return c.text || "";
  } catch(e) { return c.text || ""; }
}

async function fetchBoard(boardId, colMap, dateFilter) {
  let all=[], cursor=null;
  for (let p=0; p<30; p++) {
    let q;
    if (cursor) {
      q = "{next_items_page(limit:100,cursor:\"" + cursor + "\"){cursor items{id name column_values{id text value}}}}";
    } else if (dateFilter) {
      q = "{boards(ids:" + boardId + "){items_page(limit:100,query_params:{rules:[{column_id:\"date4\",compare_value:[\"" + dateFilter + "\"],operator:greater_than_or_equals}]}){cursor items{id name column_values{id text value}}}}}";
    } else {
      q = "{boards(ids:" + boardId + "){items_page(limit:100){cursor items{id name column_values{id text value}}}}}";
    }
    const data = await gql(q);
    const pd = cursor ? data?.data?.next_items_page : data?.data?.boards?.[0]?.items_page;
    if (!pd||!pd.items||!pd.items.length) break;
    all = all.concat(pd.items.map(item => {
      const r={id:item.id, name:item.name};
      Object.entries(colMap).forEach(function(e){ r[e[0]]=getVal(item.column_values,e[1]); });
      return r;
    }));
    if (!pd.cursor) break;
    cursor = pd.cursor;
  }
  return all;
}

function cleanNarrative(parts) {
  return parts
    .filter(Boolean)
    .map(p => p.replace(/^\*?\s*cont\.?\s*\*?\s*/gi,"").replace(/\(cont in narrative \d+.*?\)/gi,"").trim())
    .filter(Boolean)
    .join("\n\n");
}

function getIncidentTypes(r) {
  return [r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4].filter(Boolean).join(", ") || "—";
}

function stripPeriodSeparators(text) {
  if (!text || text === "—") return "";
  return text
    .replace(/\n\.\n/g, "\n\n")   // replace .\n between paragraphs with blank line
    .replace(/^\s*\.\s*\n/g, "")  // strip leading standalone period line
    .replace(/\n\s*\.\s*$/g, "")  // strip trailing standalone period line
    .trim();
}

function getIRValue(r, key) {
  if (key==="narrative") return cleanNarrative([r.narrative1,r.narrative2,r.narrative3,r.narrative4]) || "—";
  if (key==="hrRec") {
    const rec = r.hrRecommendation && r.hrRecommendation!=="—" ? "Recommendation: "+r.hrRecommendation : "";
    const find = r.hrFindings && r.hrFindings!=="—" ? "Findings: "+r.hrFindings : "";
    return [rec,find].filter(Boolean).join("\n\n") || "—";
  }
  if (key==="interviewNarrative") {
    const parts = [r.interviewNarrative1, r.interviewNarrative2]
      .filter(Boolean)
      .map(function(p){ return p.replace(/^\s*\.\s*\n?/,"").replace(/\n\s*\.\s*$/,"").trim(); });
    return parts.join("\n\n") || "—";
  }
  return r[key]||"—";
}

function badgeCls(s) {
  if (!s) return "bg-gray";
  const l=s.toLowerCase();
  if (l.includes("completed")) return "bg-green";

  if (l.includes("action needed")||l.includes("termination")) return "bg-red";
  return "bg-gray";
}

  const fdto=document.getElementById("f-date-to").value;

  // Merge IR and HR items — tag each with its board

    ...irItems.map(function(r){ return Object.assign({},r,{_board:IR_BOARD,_isHR:false}); }),
    ...hrItems.map(function(r){ return Object.assign({},r,{_board:HR_BOARD,_isHR:true}); })
  ];

  const filtered = allItems.filter(function(r) {
    if (!r._isHR && (r.category||"").toLowerCase()==="background check denial") return false;
    if (q && ![(r.caseId||""),(r.branch||""),(r.subjectName||""),displayName(r)].some(function(s){return s.toLowerCase().includes(q);})) return false;
    if (fb && r.branch!==fb) return false;
    if (fc && r.category!==fc) return false;

    if (fap && r.apFollowUp!==fap) return false;
    if (fhr && r.hrRec!==fhr) return false;

    if (fret==="no" && (r.retainVideo||"").toLowerCase().includes("yes")) return false;
    if (fdeny==="has" && !getLinkedDS(r).length) return false;
    if (fdeny==="none" && getLinkedDS(r).length) return false;
    if (fdfrom && r.date && r.date < fdfrom) return false;
    if (fdto && r.date && r.date > fdto) return false;

async function fetchItemDetail(id) {
  if (irDetailCache[id]) {
    // Always clear file data from cache so we get fresh signed URLs
    const cached = Object.assign({}, irDetailCache[id]);
    delete cached.documents;
    delete cached.pictures;
    // Re-fetch just for fresh asset URLs if we have file data
    if (irDetailCache[id].documents || irDetailCache[id].pictures) {
      const q = "{items(ids:["+id+"]){id name column_values{id text value}}}";
      const data = await gql(q);
      const item = data?.data?.items?.[0];
      if (item) {
        cached.documents = getVal(item.column_values, "files");
        cached.pictures = getVal(item.column_values, "files9");
      }
    }
    return cached;
  }
  // Fetch full detail columns for a single item
  const q = "{items(ids:["+id+"]){id name column_values{id text value}}}";
  const data = await gql(q);
  const item = data?.data?.items?.[0];
  if (!item) return null;
  const detail = {id:item.id, name:item.name};
  Object.entries(IR_COLS).forEach(function(e){ detail[e[0]]=getVal(item.column_values,e[1]); });
  // Store board reference
  detail._board = selectedBoard;
  detail._isHR = selectedBoard === HR_BOARD;
  // Merge into correct items array
  const allItems = irItems.concat(hrItems);
  const existing = allItems.find(function(x){return x.id===id;});
  if (existing) Object.assign(existing, detail);
  irDetailCache[id] = detail;
  return detail;
}

async function selectItem(id, board) {
  selectedId = id;
  selectedBoard = board || IR_BOARD;
  renderList();
  const allItems = irItems.concat(hrItems);
  const r = allItems.find(function(x){return x.id===id;});
  if (!r) return;
  // Show skeleton while loading detail
  document.getElementById("detail-panel").innerHTML = "<div class='loading'><div class='spinner'></div><span>Loading case...</span></div>";
  document.getElementById("preview-body").innerHTML = "<div class='preview-empty'>Loading files...</div>";
  // Fetch full detail if not cached
  const detail = await fetchItemDetail(id);
  if (detail) {
    renderDetail(detail);
    updateStatusBar(detail);
    renderPreview(detail);
    // Auto-load BB detail only if Open Investigation
    if (isSectionVisible("sec-bb") && detail.apFollowUp && detail.apFollowUp.toLowerCase().includes("open invest")) {
      setTimeout(function(){ loadBBDetail(id); }, 300);
    }
    // Auto-load interview activity only if interview status is set
    if (isSectionVisible("sec-interview") && detail.interviewStatus && detail.interviewStatus.trim() !== "" && detail.interviewStatus !== "—") {
      setTimeout(function(){ loadInterviewActivity(id); }, 500);
    }
  }
}

async function refreshCase(id) {
  delete irDetailCache[id];

async function renderPreview(r) {
  const body = document.getElementById("preview-body");
  const count = document.getElementById("preview-count");
  if (!r) { body.innerHTML="<div class='preview-empty'>Select a case to preview files</div>"; count.textContent=""; return; }

  body.innerHTML="<div class='preview-empty'>Loading files...</div>";

  const files = [];

  function parseFiles(raw, defaultLabel) {
    if (!raw || raw==="—" || raw==="") return;
    try {
      const parsed = JSON.parse(raw);
      const arr = parsed.files || (Array.isArray(parsed) ? parsed : []);
      arr.forEach(function(f){
        files.push({
          assetId: f.assetId,
          name: f.name || defaultLabel,
          isImage: f.isImage==="true" || f.isImage===true || /\.jfif$/i.test(f.name||'')
        });
      });
    } catch(e) {}
  }
  parseFiles(r.documents, "Document");
  parseFiles(r.pictures, "Picture");

  if (r.oneDriveLink && r.oneDriveLink!=="—") {
    files.push({url:r.oneDriveLink, name:"OneDrive Video", isImage:false, isSP:true});
  }

  count.textContent = files.length ? files.length+" file"+(files.length>1?"s":"") : "";

  if (!files.length) {
    body.innerHTML="<div class='preview-empty'>No files attached to this case</div>";
    return;
  }

  // Fetch public URLs from Monday for asset IDs
  const assetIds = files.filter(function(f){return f.assetId;}).map(function(f){return f.assetId;});
  if (assetIds.length) {
    try {
      const q = "{assets(ids:["+assetIds.join(",")+"]){id public_url name}}";
      const data = await gql(q);
      const assets = data?.data?.assets || [];
      // Fetch image blobs through proxy to get around CORS
      await Promise.all(assets.map(async function(a){
        const f = files.find(function(x){return String(x.assetId)===String(a.id);});
        if (!f || !a.public_url) return;
        f.directUrl = a.public_url;
        f.directUrl = a.public_url;
        if (f.isImage) {
          // Fetch image through corsproxy as blob to bypass CORS
          f.url = a.public_url; // fallback, will be replaced by blob below
          f._fetchUrl = a.public_url;
        } else {
          // PDFs open via Google Docs viewer
          f.url = a.public_url;
        }
      }));
    } catch(e) {}
  }

  // Use corsproxy as direct img src (not fetch) - this worked before
  files.filter(function(f){ return f.isImage && f._fetchUrl; }).forEach(function(f){
    f.url = "https://images.weserv.nl/?url=" + encodeURIComponent(f._fetchUrl.replace(/^https:\/\//,""));
  });

  const imageFiles = files.filter(function(f){ return f.url && f.isImage; });
  window.currentImageFiles = imageFiles;

  body.innerHTML = files.map(function(f, idx){
    if (!f.url) return "";
    const isPdf = /\.pdf$/i.test(f.name||"");
    const imgIdx = imageFiles.findIndex(function(x){ return x === f; });
    if (f.isSP) {
      return "<a class='preview-doc' href='"+f.url+"' target='_blank'>"+
        "<div class='preview-doc-icon'>🎬</div>"+
        "<div class='preview-doc-info'><div class='preview-doc-name'>"+f.name+"</div>"+
        "<div class='preview-doc-sub'>Open in SharePoint</div></div></a>";
    } else if (f.isImage) {
      return "<div class='preview-thumb' onclick='openLightbox(window.currentImageFiles,"+imgIdx+")'>"+
        "<img src='"+f.url+"' alt='"+f.name+"' style='width:100%;max-height:400px;object-fit:contain;background:#0d1520;display:block;' onerror='this.style.display=\"none\";this.nextSibling.style.display=\"flex\"'/>"+
        "<div style='display:none;height:200px;align-items:center;justify-content:center;color:#6a8aaa;font-size:11px;flex-direction:column;gap:6px;'>"+
          "<span style='font-size:24px;'>🖼</span><a href='"+f.url+"' target='_blank' style='color:#5a9fd4;font-size:11px;'>"+f.name+"</a></div>"+
        "<div class='preview-thumb-label'>"+f.name+"</div></div>";
    } else if (isPdf) {
      const pdfViewer = "https://docs.google.com/viewer?url=" + encodeURIComponent(f.url);
      return "<a class='preview-doc' href='" + pdfViewer + "' target='_blank'>"+
        "<div class='preview-doc-icon'>📄</div>"+
        "<div class='preview-doc-info'><div class='preview-doc-name'>"+f.name+"</div>"+
        "<div class='preview-doc-sub'>Click to view PDF</div></div></a>";
    } else {
      return "<a class='preview-doc' href='"+f.url+"' target='_blank'>"+
        "<div class='preview-doc-icon'>📎</div>"+
        "<div class='preview-doc-info'><div class='preview-doc-name'>"+f.name+"</div>"+
        "<div class='preview-doc-sub'>Click to open</div></div></a>";
    }
  }).join("");
}

let lightboxImages = [], lightboxIndex = 0;

function openLightbox(images, startIndex) {
  lightboxImages = images;
  lightboxIndex = startIndex;
  showLightboxImage();
  document.getElementById("lightbox").style.display = "flex";
}

function showLightboxImage() {
  const f = lightboxImages[lightboxIndex];
  const img = document.getElementById("lightbox-img");
  img.src = f.url;
  // If proxied image fails, try direct URL
  img.onerror = function() {
    if (f.directUrl && img.src !== f.directUrl) img.src = f.directUrl;
  };
  document.getElementById("lightbox-counter").textContent = (lightboxIndex+1)+" / "+lightboxImages.length;
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxImages.length) % lightboxImages.length;
  showLightboxImage();
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
  lightboxImages = [];
}

// Close lightbox on background click
document.addEventListener("click", function(e){
  if (e.target.id==="lightbox") closeLightbox();
});

// Keyboard navigation
document.addEventListener("keydown", function(e){
  if (document.getElementById("lightbox").style.display==="flex") {
    if (e.key==="ArrowRight") lightboxNav(1);
    else if (e.key==="ArrowLeft") lightboxNav(-1);
    else if (e.key==="Escape") closeLightbox();
  }
});

async function updateColumn(itemId, boardId, columnId, value, type) {
  let mut;
  if (type==="longtext") {
    // Use change_simple_column_value for long text — properly overwrites existing content
    const escaped = value.replace(/\\/g,"\\\\").replace(/"/g,"\\\"").replace(/\n/g,"\\n");
    mut = "mutation{change_simple_column_value(board_id:"+boardId+",item_id:"+itemId+",column_id:\""+columnId+"\",value:\""+escaped+"\"){id}}";
  } else {
    let colValue;
    if (type==="text") colValue=JSON.stringify(value);
    else if (type==="status") colValue=JSON.stringify({label:value});
    mut = "mutation{change_column_value(board_id:"+boardId+",item_id:"+itemId+",column_id:\""+columnId+"\",value:"+JSON.stringify(colValue)+"){id}}";
  }
  try { const res=await gql(mut); return !!(res&&res.data&&(res.data.change_column_value||res.data.change_simple_column_value)); }
  catch(e) { return false; }
}

async function saveBBNotes(itemId) {
  const raw = document.getElementById("edit-bbNotes").value;
  const val = raw.replace(/\n\s*\n/g, "\n.\n");
  const ok = await updateColumn(itemId, selectedBoard, "text_mm2k49q8", val, "text");
  showMsg("msg-bbNotes", ok);
  if (ok) { const item=irItems.find(function(x){return x.id===itemId;}); if(item) item.bbNotes=val; }
}

async function loadBBDetail(irId) {
  const container = document.getElementById("bb-detail-"+irId);
  if (!container) return;
  container.innerHTML = "<div style='font-size:11px;color:#4a6a8a;'>Loading Black Book record...</div>";
  try {
    // Use linked_items query — correct way to read board relations via API
    const q = "{items(ids:["+irId+"]){linked_items(link_to_item_column_id:\"board_relation_mm2kcgyg\",linked_board_id:"+BB_BOARD+"){id name column_values{id text value} subitems{id name column_values{id text value}}}}}";
    const data = await gql(q);
    const linkedItems = data?.data?.items?.[0]?.linked_items || [];
    if (!linkedItems.length) {
      container.innerHTML = "<div style='font-size:11px;color:#4a6a8a;'>No linked Black Book record found. Make sure the automation has run after setting AP Follow-up to Open Investigation.</div>";
      return;
    }
    const bbItem = linkedItems[0];
    const bbItemId = bbItem.id;

    // Debug — log all column IDs and values
    if (bbItem.subitems && bbItem.subitems.length) {
    }

    function bbVal(cols, id) {

async function addBBSubitem(bbItemId, irId) {
  const note = document.getElementById("bb-new-note").value.trim();
  const date = document.getElementById("bb-new-date").value;
  const status = document.getElementById("bb-new-status").value;
  const msgEl = document.getElementById("msg-bb-subitem");

  if (!note) {
    if (msgEl) { msgEl.textContent = "Please enter a note"; msgEl.className = "save-msg err"; setTimeout(function(){msgEl.textContent="";},3000); }
    return;
  }

  const btn = document.querySelector("[onclick*='addBBSubitem']");
  if (btn) { btn.textContent = "Saving..."; btn.disabled = true; }

  try {
    // Create subitem
    const itemName = date ? date + " — Investigation Note" : "Investigation Note";
    const escapedName = itemName.replace(/"/g, '\\"');
    const colObj = {"status": {label: status}, "long_text_mkwt46jk": note};
    if (date) colObj["date0"] = {date: date};
    const colVals = JSON.stringify(JSON.stringify(colObj));
    const mut = "mutation{create_subitem(parent_item_id:"+bbItemId+",item_name:\""+escapedName+"\",column_values:"+colVals+"){id}}";
    const res = await gql(mut);
    const ok = !!res?.data?.create_subitem?.id;

    if (ok) {
      if (msgEl) { msgEl.textContent = "Entry added!"; msgEl.className = "save-msg ok"; }
      document.getElementById("bb-new-note").value = "";
      // Reload BB detail to show new entry
      setTimeout(function(){ loadBBDetail(irId); }, 1000);
    } else {
      throw new Error("No ID returned");
    }
  } catch(e) {
    if (msgEl) { msgEl.textContent = "Failed: "+e.message; msgEl.className = "save-msg err"; }
  }

  if (btn) { btn.textContent = "+ Add Log Entry"; btn.disabled = false; }
  if (msgEl) setTimeout(function(){ msgEl.textContent = ""; }, 4000);
}

async function showActivityLog(itemId, boardId, name) {
  const modal = document.getElementById("activity-modal");
  const body = document.getElementById("activity-modal-body");
  const sub = document.getElementById("activity-modal-sub");
  modal.style.display = "flex";
  sub.textContent = name;
  body.innerHTML = "<div style='color:#4a6a8a;font-size:12px;'>Loading activity log...</div>";

  try {
    const q = "{boards(ids:"+boardId+"){activity_logs(item_ids:["+itemId+"],limit:50){id event data created_at user_id}}}";
    const data = await gql(q);
    const logs = data?.data?.boards?.[0]?.activity_logs || [];

    if (!logs.length) {
      body.innerHTML = "<div style='color:#4a6a8a;font-size:12px;font-style:italic;'>No activity found for this record.</div>";
      return;
    }

    body.innerHTML = logs.map(function(log) {
      let parsed = {}, eventDesc = "";
      try { parsed = JSON.parse(log.data||"{}"); } catch(e){}

      const date = log.created_at
        ? (function(){
            let d;
            if (typeof log.created_at === "string" && log.created_at.includes("-")) {
              d = new Date(log.created_at);
            } else {
              const ts = parseInt(log.created_at);
              d = new Date(ts > 1e12 ? ts : ts * 1000);
            }
            return (!d || isNaN(d.getTime())) ? "—" :
              d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) +
              " " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
          })()
        : "—";

      // Parse event type
      const evt = (log.event||"").toLowerCase();
      if (evt.includes("update_column") || evt.includes("change_column")) {
        const newVal = parsed.value?.label?.text || parsed.value?.name || (typeof parsed.value==="string"?parsed.value:"") || "—";
        const prevVal = parsed.previous_value?.label?.text || parsed.previous_value?.name || (typeof parsed.previous_value==="string"?parsed.previous_value:"") || "";
        const col = parsed.column_title || parsed.column_id || "field";
        eventDesc = "<strong>"+col+"</strong> changed to <span style='color:#4caf80;'>"+newVal+"</span>"+(prevVal?" <span style='color:#4a6a8a;'>(was: "+prevVal+")</span>":"");
      } else if (evt.includes("create_item") || evt.includes("create_pulse")) {
        eventDesc = "<span style='color:#5a9fd4;'>Item created</span>";
      } else if (evt.includes("create_subitem")) {
        eventDesc = "<span style='color:#5a9fd4;'>Subitem added: </span>"+(parsed.pulse_name||"");
      } else if (evt.includes("add_file")) {
        eventDesc = "<span style='color:#e0a030;'>File attached</span>";
      } else if (evt.includes("add_update") || evt.includes("create_update")) {
        eventDesc = "<span style='color:#c0d4e8;'>Update/comment added</span>";
      } else {
        eventDesc = "<span style='color:#6a8aaa;'>"+log.event+"</span>";
      }

      return "<div style='padding:8px 0;border-bottom:1px solid #1a2535;display:flex;gap:12px;align-items:flex-start;'>"+
        "<span style='color:#4a6a8a;white-space:nowrap;font-size:10px;min-width:140px;margin-top:1px;'>"+date+"</span>"+
        "<span style='flex:1;font-size:12px;color:#c0d4e8;'>"+eventDesc+"</span>"+
      "</div>";
    }).join("");
  } catch(e) {
    body.innerHTML = "<div style='color:#e05050;font-size:12px;'>Error loading activity log: "+e.message+"</div>";
  }
}

async function loadInterviewActivity(itemId) {
  const container = document.getElementById("interview-activity-"+itemId);
  if (!container) return;
  try {
    const q = "{boards(ids:"+IR_BOARD+"){activity_logs(item_ids:["+itemId+"],column_ids:[\"color_mm2gyjyr\",\"text_mm2g2kmt\"],limit:10){id event data created_at}}}";
    const data = await gql(q);
    const logs = data?.data?.boards?.[0]?.activity_logs || [];
    if (!logs.length) {
      container.innerHTML = "<span style='color:#2d3f55;font-style:italic;'>No history yet</span>";
      return;
    }
    container.innerHTML = logs.map(function(log) {
      let parsed = {};
      try { parsed = JSON.parse(log.data||"{}"); } catch(e){}

      // Date only - no time
      let date = "—";
      if (log.created_at) {
        let d;
        if (typeof log.created_at === "string" && log.created_at.includes("-")) {
          d = new Date(log.created_at);
        } else {
          const ts = parseInt(log.created_at);
          d = new Date(ts > 1e12 ? ts : ts * 1000);
        }
        if (d && !isNaN(d.getTime())) {
          date = d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        }
      }

      // Extract value safely - handles status labels and plain text
      function extractVal(v) {
        if (!v || v === null) return "";
        if (typeof v === "string") return v;
        if (typeof v === "object") {
          if (v.label && v.label.text) return v.label.text;
          if (v.name) return v.name;
          if (v.text) return v.text;
          if (v.value) return String(v.value);
        }
        return String(v);
      }

      // For text columns, value may be nested under changed_at or just be the string
      let newVal = extractVal(parsed.value) || extractVal(parsed.to);
      let prevVal = extractVal(parsed.previous_value) || extractVal(parsed.from);
      
      // If still empty, try column_title based approach
      if (!newVal && parsed.column_title) newVal = extractVal(parsed.value);
      
      newVal = newVal || "—";
      
      const colName = (log.data||"").includes("color_mm2gyjyr") ? "Status" : "Reason";

      return "<div style='padding:6px 0;border-bottom:1px solid #1a2535;display:flex;gap:10px;align-items:flex-start;'>"+
        "<span style='color:#4a6a8a;white-space:nowrap;font-size:10px;margin-top:2px;min-width:130px;'>"+date+"</span>"+
        "<span style='flex:1;font-size:12px;color:#c0d4e8;'>"+colName+": <strong style='color:#e0eaf5;'>"+newVal+"</strong>"+
          (prevVal?" <span style='color:#4a6a8a;font-size:11px;'>(was: "+prevVal+")</span>":"")+
        "</span>"+
      "</div>";
    }).join("");
  } catch(e) {
    container.innerHTML = "<span style='color:#4a6a8a;'>Could not load history</span>";
  }
}

async function saveAndSubmitVR(itemId) {
  const btn = document.querySelector("#sec-vr .btn-primary");
  if (btn) { btn.textContent = "Submitting..."; btn.disabled = true; }
  const msgEl = document.getElementById("msg-vrNotes");

  try {
    const r = irDetailCache[itemId] || irItems.find(function(x){return x.id===itemId;});
    if (!r) throw new Error("Case not found");

    // 1. Save notes to IR board
    const raw = document.getElementById("edit-vrNotes").value;
    const notesVal = raw.replace(/\n\s*\n/g, "\n.\n");
    await updateColumn(itemId, selectedBoard, "text_mm2fvpmd", notesVal, "text");
    if (r) r.vrNotes = notesVal;

    // 2. Build narrative: notes + " - " + original narrative
    const narrative = getIRValue(r, "narrative");
    const fullNarrative = (raw.trim() ? "VIDEO REQUEST : "+raw.trim()+" - " : "") + narrative;

    // 3. Get today's date
    const today = new Date().toISOString().split("T")[0];

    // 4. Create VR item on VR board
    const cid = r.caseId||r.pushableCaseId||r.id;
    const itemName = cid;
    const colVals = JSON.stringify({
      "status6": {"label": r.branch||"Incident Review"},
      "dropdown0": r.branch ? {"label": r.branch} : undefined,
      "date4": today ? {"date": today} : undefined,
      "long_text": {"text": fullNarrative},
      "text_mkwz2hhp": String(itemId),
      "text_mm0q7wkt": cid
    }).replace(/:undefined/g, ":null");

    const mut = "mutation{create_item(board_id:"+VR_BOARD+",item_name:\""+itemName.replace(/"/g,'\\"')+"\",column_values:"+JSON.stringify(colVals)+"){id}}";
    const res = await gql(mut);
    const newId = res?.data?.create_item?.id;

    if (newId) {
      if (msgEl) { msgEl.textContent = "Video Request created!"; msgEl.className = "save-msg ok"; }
      // Refresh VR items in background
      setTimeout(async function(){
        const dateFilter = new Date(); dateFilter.setDate(dateFilter.getDate()-90);
        vrItems = await fetchBoard(VR_BOARD, VR_COLS, dateFilter.toISOString().split("T")[0]);
        const detail = irDetailCache[itemId];
        if (detail) renderDetail(detail);
      }, 1500);
    } else {
      throw new Error("No item ID returned");
    }
  } catch(e) {
    if (msgEl) { msgEl.textContent = "Failed: "+e.message; msgEl.className = "save-msg err"; }
  }

  if (btn) { btn.textContent = btn.textContent.includes("additional") ? "💾 Save Notes & Submit New Request" : "💾 Save Notes & Submit Video Request"; btn.disabled = false; }
  if (msgEl) setTimeout(function(){ msgEl.textContent = ""; }, 4000);
}

async function saveAll(itemId) {

  async function tryField(elId, colId, type) {

    const val = el.value;

      if (elId==="edit-oneDriveLink") item.oneDriveLink = val;
      if (elId==="edit-vrNotes") item.vrNotes = val;

  await tryField("edit-apFindings",        "text95",              "text");
  await tryField("edit-hrFindings",        "long_text_mm0f4cbg",  "longtext");
  await tryField("edit-interviewNarrative","long_text__1",        "longtext");

// ── Settings panel ──────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById("settings-panel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) buildSettingsUI();
}

function switchTab(tabId) {
  document.querySelectorAll(".stab-content").forEach(function(el){el.classList.remove("active");});
  document.querySelectorAll(".stab").forEach(function(el){el.classList.remove("active");});
  document.getElementById(tabId).classList.add("active");
  event.target.classList.add("active");
}

function buildSettingsUI() {
  // Field toggles
  const ft = document.getElementById("field-toggles");
  ft.innerHTML = FIELD_DEFS.map(function(f){
    const checked = hiddenFields.indexOf(f.id)<0;
    return "<label class='settings-check'><input type='checkbox' "+(checked?"checked":"")+" onchange=\"toggleField('"+f.id+"',this.checked)\"/> "+f.label+"</label>";
  }).join("");
  // Section drag list
  buildSectionDragList();
}

function buildSectionDragList() {
  const list = document.getElementById("section-drag-list");
  list.innerHTML = sectionOrder.map(function(sid){
    const def = SECTION_DEFS.find(function(s){return s.id===sid;});
    if (!def) return "";
    const visible = hiddenSections.indexOf(sid)<0;
    return "<div class='drag-item' draggable='true' data-id='"+sid+"' ondragstart='dragStart(event)' ondragover='dragOver(event)' ondrop='dropSection(event)' ondragleave='dragLeave(event)'>"+
      "<span class='drag-handle'>⠿</span>"+
      "<input type='checkbox' "+(visible?"checked":"")+" onchange=\"toggleSection('"+sid+"',this.checked)\"/>"+
      "<span>"+def.label+"</span>"+
    "</div>";
  }).join("");
}

let dragSrcId = null;
function dragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  e.currentTarget.classList.add("drag-over");
}
function dragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function dropSection(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const targetId = e.currentTarget.dataset.id;
  if (!dragSrcId || dragSrcId === targetId) return;
  const srcIdx = sectionOrder.indexOf(dragSrcId);
  const tgtIdx = sectionOrder.indexOf(targetId);
  sectionOrder.splice(srcIdx, 1);
  sectionOrder.splice(tgtIdx, 0, dragSrcId);
  dragSrcId = null;
  localStorage.setItem("sectionOrder", JSON.stringify(sectionOrder));
  buildSectionDragList();
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function toggleField(id, visible) {
  if (visible) hiddenFields = hiddenFields.filter(function(x){return x!==id;});
  else if (hiddenFields.indexOf(id)<0) hiddenFields.push(id);
  localStorage.setItem("hiddenFields", JSON.stringify(hiddenFields));
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function toggleSection(id, visible) {
  if (visible) hiddenSections = hiddenSections.filter(function(x){return x!==id;});
  else if (hiddenSections.indexOf(id)<0) hiddenSections.push(id);
  localStorage.setItem("hiddenSections", JSON.stringify(hiddenSections));
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function isSectionVisible(id) { return hiddenSections.indexOf(id)<0; }

let columnOptionsCache = {};

async function fetchColumnOptions(colId) {
  if (columnOptionsCache[colId]) return columnOptionsCache[colId];
  try {
    const q = "{boards(ids:"+IR_BOARD+"){columns(ids:[\""+colId+"\"]){settings_str}}}";
    const data = await gql(q);
    const settings = JSON.parse(data?.data?.boards?.[0]?.columns?.[0]?.settings_str||"{}");
    const labels = settings.labels || {};
    const options = Object.values(labels).filter(Boolean);
    columnOptionsCache[colId] = options;
    return options;
  } catch(e) { return []; }
}

async function populateDropdown(ddId) {
  if (!selectedId) return;
  const r = irItems.find(function(x){return x.id===selectedId;});
  if (!r) return;
  const dd = document.getElementById(ddId);
  dd.innerHTML = "<div class='status-saving'>Loading options...</div>";

  const MAP = {
    "dd-ap":          {colId:"dup__of_hr_decision____1", prop:"apFollowUp"},
    "dd-category":    {colId:"color_mknf4hd3",           prop:"category"},
    "dd-video":       {colId:"deny_service__",            prop:"retainVideo"},
    "dd-video-local": {colId:"deny_service__",            prop:"retainVideo"},
    "dd-deny":        {colId:"district_leader",           prop:"denyService"},
    "dd-hr":          {colId:"status_1__1",               prop:"hrRec"},
    "dd-hrrec":       {colId:"color_mm0fehr4",            prop:"hrRecommendation"},
    "dd-hrrec-local": {colId:"color_mm0fehr4",            prop:"hrRecommendation"},
    "dd-interview":   {colId:"color_mm2gyjyr",            prop:"interviewStatus"},
    "dd-handshake":   {colId:"color_mm0rs4kc",            prop:"richHandshake"},
    "dd-ownership":   {colId:"color_mm0q8n2x",            prop:"currentOwnership"}
  };

  const entry = MAP[ddId];
  if (!entry) { dd.innerHTML = "<div class='status-saving'>Not configurable here</div>"; return; }

  const options = await fetchColumnOptions(entry.colId);
  if (!options.length) { dd.innerHTML = "<div class='status-saving'>No options found</div>"; return; }

  const current = r[entry.prop];

  // Color coding by keyword
  function optionColor(opt) {
    const l = opt.toLowerCase();
    if (l.includes("terminat") || l.includes("action needed") || l.includes("deny") || l.includes("no")) return "#3a1a1a";
    if (l.includes("complet") || l.includes("approved") || l.includes("done") || l.includes("yes")) return "#1a3a2a";
    if (l.includes("progress") || l.includes("pending") || l.includes("review")) return "#2a2010";
    if (l.includes("written") || l.includes("warning") || l.includes("final")) return "#2a1a3a";
    return "";
  }
  function optionTextColor(opt) {
    const l = opt.toLowerCase();
    if (l.includes("terminat") || l.includes("action needed") || l.includes("deny") || l.includes("no")) return "#e05050";
    if (l.includes("complet") || l.includes("approved") || l.includes("done") || l.includes("yes")) return "#4caf80";
    if (l.includes("progress") || l.includes("pending") || l.includes("review")) return "#e0a030";
    if (l.includes("written") || l.includes("warning") || l.includes("final")) return "#a07ad5";
    return "#c0d4e8";
  }

  dd.innerHTML = options.map(function(opt){
    const isCurrent = opt === current;
    const bg = optionColor(opt);
    const fg = optionTextColor(opt);
    return "<div class='status-option"+(isCurrent?" current":"")+"' style='"+(bg?"background:"+bg+";":"")+"color:"+fg+";' onclick='selectStatus(\""+ddId+"\",\""+entry.colId+"\",\""+entry.prop+"\",\""+opt.replace(/"/g,"&quot;")+"\")'>"+
      (isCurrent?"✓ ":"")+opt+
    "</div>";
  }).join("");
}

  showMsg("msg-hrFindings", ok);
  if (ok) { const item=irItems.find(function(x){return x.id===itemId;}); if(item) item.hrFindings=val; }
}

async function saveInterviewNarrative(itemId) {
  const raw = document.getElementById("edit-interviewNarrative").value;
  // Insert "." between paragraphs (replace blank lines with a line containing just ".")
  const val = raw.replace(/\n\s*\n/g, "\n.\n");
  const LIMIT = 2000;
  let part1 = val, part2 = "";
  if (val.length > LIMIT) {
    let splitAt = val.lastIndexOf("\n.\n", LIMIT);
    if (splitAt < 500) splitAt = val.lastIndexOf("\n", LIMIT);
    if (splitAt < 0) splitAt = LIMIT;
    part1 = val.substring(0, splitAt).trim();
    part2 = val.substring(splitAt).trim();
    if (!part1.endsWith(".")) part1 = part1 + "\n.";
  }
  const ok1 = await updateColumn(itemId, selectedBoard, "long_text__1", part1, "longtext");
  let ok2 = true;
  if (part2) {
    ok2 = await updateColumn(itemId, selectedBoard, "long_text3__1", part2, "longtext");
  } else {
    ok2 = await updateColumn(itemId, selectedBoard, "long_text3__1", "", "longtext");
  }
  const ok = ok1 && ok2;
  showMsg("msg-interviewNarrative", ok);
  if (ok) {
    const item = irItems.find(function(x){return x.id===itemId;});
    if (item) { item.interviewNarrative1=part1; item.interviewNarrative2=part2; }
  }
}

  const dd = document.getElementById(ddId);
  dd.innerHTML = "<div class='status-saving'>Saving...</div>";
  const ok = await updateColumn(selectedId, IR_BOARD, colId, value, "status");
  dd.classList.remove("open");
  if (ok) {
    r[prop] = value;
    updateStatusBar(r);
    renderList();
    if (selectedId) renderDetail(r);
  } else {
    alert("Save failed — please try again.");
  }
}

// ── Cache helpers ─────────────────────────────────────────────
const CACHE_KEY = "rusa_cv_cache";
const CACHE_TS_KEY = "rusa_cv_cache_ts";
const CACHE_MAX_AGE = 30 * 60 * 1000; // 30 minutes

function saveCache(ir, vr, ds) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ir, vr, ds}));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
  } catch(e) {}
}

function loadCache() {
  try {
    const ts = parseInt(localStorage.getItem(CACHE_TS_KEY)||"0");
    const age = Date.now() - ts;
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return {data, age, isStale: age > CACHE_MAX_AGE};
  } catch(e) { return null; }
}

function clearCache() {
  localStorage.removeItem(CACHE_KEY);
  localStorage.removeItem(CACHE_TS_KEY);
}

function getDateFilter(daysBack) {
  const d = new Date();
  d.setDate(d.getDate() - daysBack);
  return d.toISOString().split("T")[0];
}

function showCacheBadge(age) {
  const el = document.getElementById("cache-badge");
  if (!el) return;
  const mins = Math.round(age / 60000);
  el.textContent = mins < 1 ? "● just synced" : "● cached "+mins+"m ago";
}

async function loadOlderCases() {
  const btn = document.getElementById("btn-load-older");
  const selectedBranch = document.getElementById("f-branch").value;

  if (!selectedBranch) {
    alert("Please select a branch first — loading older cases for all branches at once takes too long. Select a branch filter, then click Load older cases.");
    return;
  }

  if (btn) { btn.textContent = "Loading "+selectedBranch+"..."; btn.disabled = true; }
  try {
    const dateFilter = getDateFilter(365);
    // Fetch older cases with branch filter applied via Monday query
    const q = "{boards(ids:"+IR_BOARD+"){items_page(limit:100,query_params:{rules:[{column_id:\"date4\",compare_value:[\""+dateFilter+"\"],operator:greater_than_or_equals},{column_id:\"dropdown0\",compare_value:[\""+selectedBranch+"\"],operator:any_of}]}){cursor items{id name column_values{id text value}}}}}";
    let all=[], cursor=null;
    for (let p=0; p<20; p++) {
      const pageQ = cursor
        ? "{next_items_page(limit:100,cursor:\""+cursor+"\"){cursor items{id name column_values{id text value}}}}"
        : q;
      const data = await gql(pageQ);
      const pd = cursor ? data?.data?.next_items_page : data?.data?.boards?.[0]?.items_page;
      if (!pd||!pd.items||!pd.items.length) break;
      all = all.concat(pd.items.map(function(item){
        const r={id:item.id, name:item.name};
        Object.entries(IR_LIST_COLS).forEach(function(e){ r[e[0]]=getVal(item.column_values,e[1]); });
        return r;
      }));
      if (!pd.cursor) break;
      cursor = pd.cursor;
    }
    const existing = new Set(irItems.map(function(x){return x.id;}));
    const newItems = all.filter(function(x){return !existing.has(x.id);});
    irItems = irItems.concat(newItems);
    renderList();
    if (btn) {
      btn.textContent = newItems.length ? "+"+newItems.length+" older cases loaded" : "No older cases found";
      btn.disabled = false;
      btn.style.color="#aaa"; btn.style.borderColor="#aaa";
    }
  } catch(e) {
    if (btn) { btn.textContent = "Load older cases"; btn.disabled = false; }
  }
}

async function refreshAll() {
  clearCache();
  document.getElementById("live-badge").textContent = "● Refreshing...";
  irDetailCache = {};
  await init();
}

async function init() {
  const cached = loadCache();

  if (cached && !cached.isStale) {
    // INSTANT LOAD from cache
    irItems = cached.data.ir;
    vrItems = cached.data.vr || [];
    dsItems = cached.data.ds || [];
    const mins = Math.round(cached.age / 60000);
    document.getElementById("live-badge").textContent = "● "+irItems.length+" cases (cached)";
    showCacheBadge(cached.age);
    populateFilters();
    renderList();
    // Refresh from Monday silently in background
    refreshInBackground();
    return;
  }

  if (cached && cached.isStale) {
    // Stale cache — show it immediately while we fetch fresh data
    irItems = cached.data.ir;
    vrItems = cached.data.vr || [];
    dsItems = cached.data.ds || [];
    document.getElementById("live-badge").textContent = "● "+irItems.length+" cases (updating…)";
    populateFilters();
    renderList();
    // Fetch fresh in background
    refreshInBackground();
    return;
  }

  // No cache — full load
  try {
    document.getElementById("live-badge").textContent = "● Loading…";
    const dateFilter = getDateFilter(90);
    irItems = await fetchBoard(IR_BOARD, IR_LIST_COLS, dateFilter);
    // Load HR board in parallel with VR and DS
    const [vr, ds, hr] = await Promise.all([
      fetchBoard(VR_BOARD, VR_COLS, dateFilter),
      fetchBoard(DS_BOARD, DS_COLS, dateFilter),
      fetchBoard(HR_BOARD, HR_LIST_COLS, dateFilter)
    ]);
    vrItems = vr; dsItems = ds; hrItems = hr;
    document.getElementById("live-badge").textContent = "● "+(irItems.length+hrItems.length)+" cases";
    populateFilters();
    renderList();
    saveCache(irItems, vrItems, dsItems);
    showCacheBadge(0);
  } catch(e) {
    document.getElementById("list-panel").innerHTML = "<div class=\"err-msg\">Error: "+e.message+"</div>";
    document.getElementById("live-badge").textContent = "● Error";
  }
}

async function refreshInBackground() {
  try {
    const dateFilter = getDateFilter(90);
    const [ir, vr, ds, hr] = await Promise.all([
      fetchBoard(IR_BOARD, IR_LIST_COLS, dateFilter),
      fetchBoard(VR_BOARD, VR_COLS, dateFilter),
      fetchBoard(DS_BOARD, DS_COLS, dateFilter),
      fetchBoard(HR_BOARD, HR_LIST_COLS, dateFilter)
    ]);
    irItems = ir; vrItems = vr; dsItems = ds; hrItems = hr;
    irDetailCache = {};
    saveCache(irItems, vrItems, dsItems);
    document.getElementById("live-badge").textContent = "● Live — "+(irItems.length+hrItems.length)+" cases";
    showCacheBadge(0);
    renderList();
  } catch(e) {
    document.getElementById("live-badge").textContent = "● Live (bg refresh failed)";
  }
}

// ── PANEL RESIZING ─────────────────────────────────────────
(function() {
  const STORAGE_KEY_LEFT = "rusa_panel_list_width";
  const STORAGE_KEY_RIGHT = "rusa_panel_preview_width";
  const DEFAULT_LEFT = 310;
  const DEFAULT_RIGHT = 500;

  function initPanels() {
    const listW = parseInt(localStorage.getItem(STORAGE_KEY_LEFT)) || DEFAULT_LEFT;
    const previewW = parseInt(localStorage.getItem(STORAGE_KEY_RIGHT)) || DEFAULT_RIGHT;
    const list = document.getElementById("list-panel");
    const preview = document.getElementById("preview-panel");
    if (list) { list.style.width = listW+"px"; list.style.minWidth = "150px"; }
    if (preview) { preview.style.width = previewW+"px"; preview.style.minWidth = "150px"; }
  }

  function makeResizer(resizerId, panelId, storageKey, side) {
    const resizer = document.getElementById(resizerId);
    const panel = document.getElementById(panelId);
    if (!resizer || !panel) return;
    let startX, startW;
    resizer.addEventListener("mousedown", function(e) {
      startX = e.clientX;
      startW = panel.offsetWidth;
      resizer.classList.add("dragging");
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
      function onMove(e) {
        const dx = side === "left" ? e.clientX - startX : startX - e.clientX;
        const newW = Math.max(150, Math.min(700, startW + dx));
        panel.style.width = newW+"px";
      }
      function onUp() {
        resizer.classList.remove("dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        localStorage.setItem(storageKey, panel.offsetWidth);
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
      e.preventDefault();
    });
    resizer.addEventListener("dblclick", function() {
      const def = side === "left" ? DEFAULT_LEFT : DEFAULT_RIGHT;
      panel.style.width = def+"px";
      localStorage.setItem(storageKey, def);
    });
  }

  initPanels();
  makeResizer("resizer-left", "list-panel", STORAGE_KEY_LEFT, "left");
  makeResizer("resizer-right", "preview-panel", STORAGE_KEY_RIGHT, "right");
})();

init();
</script>
