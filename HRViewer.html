<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA - HR Investigations</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1923;color:#e0eaf5;font-size:14px;}
.header{background:#0d1520;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a1a4a;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{font-size:11px;color:#9b5de5;letter-spacing:1px;}
.toolbar{display:flex;gap:6px;padding:10px 12px;align-items:center;flex-wrap:wrap;background:#131f2e;border-bottom:1px solid #2a1a4a;}
input[type=text],select{padding:6px 10px;border:1px solid #3a2a5a;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#1a1535;color:#e0eaf5;}
input[type=text]:focus,select:focus{border-color:#7b3ab5;}
input[type=date]{padding:6px 8px;border:1px solid #3a2a5a;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#1a1535;color:#e0eaf5;}
button{padding:5px 12px;border:1px solid #3a2a5a;border-radius:6px;background:#1a1535;font-size:12px;cursor:pointer;font-family:inherit;color:#c0a8e8;}
button:hover{background:#2a1a4a;}
.btn-primary{background:#7b3ab5;color:#fff;border-color:#7b3ab5;}
.btn-primary:hover{background:#6a2a9a;}
.btn-small{font-size:11px;padding:3px 10px;}
.main{display:flex;height:calc(100vh - 88px);}
.resizer{width:5px;background:#1e1a30;cursor:col-resize;flex-shrink:0;transition:background .15s;}
.resizer:hover,.resizer.dragging{background:#7b3ab5;}
.list{width:310px;min-width:310px;overflow-y:auto;border-right:1px solid #2a1a4a;background:#111020;}
.list-item{padding:10px 14px;border-bottom:1px solid #1a1030;cursor:pointer;border-left:3px solid transparent;}
.list-item:hover{background:#1a1042;}
.list-item.active{background:#2a1a5f;border-left:3px solid #9b5de5;}
.item-name{font-size:12px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e0eaf5;}
.item-caseid{font-size:11px;color:#9b5de5;font-weight:500;margin-bottom:5px;}
.item-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;}
.item-meta span{font-size:10px;color:#7a6a98;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta .lbl{color:#5a4a7a;}
.detail{flex:1;overflow-y:auto;padding:14px;min-width:0;background:#0f1923;}
.card{background:#131f2e;border-radius:10px;border:1px solid #2a1a4a;border-left:4px solid #7b3ab5;padding:16px 18px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:15px;font-weight:600;color:#e0eaf5;}
.card-caseid{font-size:11px;color:#6a4a8a;margin-top:2px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.bg-purple{background:#2a1a4a;color:#9b5de5;}
.bg-green{background:#1a3a2a;color:#4caf80;}
.bg-orange{background:#2a2010;color:#e0a030;}
.bg-red{background:#3a1a1a;color:#e05050;}
.bg-gray{background:#1e2e40;color:#8fa8c0;}
.bg-blue{background:#1a2a4a;color:#5a9fd4;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#9b5de5;text-transform:uppercase;letter-spacing:.09em;padding-bottom:4px;border-bottom:2px solid #2a1a5f;margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px 16px;}
.f{margin-bottom:2px;}
.f.full{grid-column:1/-1;}
.f.half{grid-column:span 2;}
.flabel{font-size:10px;color:#5a4a7a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fval{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;color:#c0a8e8;}
.fedit textarea{width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #3a2a5a;border-radius:6px;font-family:inherit;resize:vertical;line-height:1.6;background:#0f1923;color:#e0eaf5;}
.fedit input[type=text]{width:100%;font-size:12px;}
.fedit-actions{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.save-msg{font-size:11px;}
.save-msg.ok{color:#4caf80;}
.save-msg.err{color:#e05050;}
.vr-card{background:#0d1520;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #2a1a4a;}
.vr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.vr-agency{font-size:13px;font-weight:600;color:#e0eaf5;}
.vr-sub{font-size:11px;color:#5a4a7a;margin-top:1px;}
.vr-right{display:flex;gap:5px;align-items:center;}
.vr-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(155,93,229,.15);color:#9b5de5;}
.vr-expand{font-size:11px;padding:3px 9px;background:transparent;border:1px solid #c0392b;color:#e07070;border-radius:4px;cursor:pointer;}
.vr-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
.vrf-label{font-size:10px;color:#5a4a7a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.vrf-val{font-size:12px;color:#c0a8e8;line-height:1.5;white-space:pre-wrap;}
.vrf.full{grid-column:1/-1;}
.ds-card{background:#2a1010;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #4a1a1a;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#131f2e;border-radius:12px;padding:18px 22px;max-width:640px;width:92%;max-height:82vh;overflow-y:auto;border:1px solid #2a1a4a;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-title{font-size:14px;font-weight:600;color:#e0eaf5;}
.modal-sub{font-size:11px;color:#5a4a7a;margin-top:1px;}
.mfields{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
.mf{margin-bottom:2px;}
.mf.full{grid-column:1/-1;}
.mf-label{font-size:10px;color:#5a4a7a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.mf-val{font-size:13px;line-height:1.7;white-space:pre-wrap;color:#c0a8e8;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#5a4a7a;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid #2a1a4a;border-top-color:#7b3ab5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#5a4a7a;font-size:13px;}
.err-msg{padding:16px;color:#e05050;font-size:13px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:#0d1020;border-bottom:1px solid #2a1a4a;}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#0d1020;border-bottom:1px solid #2a1a4a;align-items:center;}
.status-bar-label{font-size:10px;color:#5a4a7a;text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
.sbutton{font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1.5px solid #3a2a5a;background:#1a1535;font-family:inherit;font-weight:500;transition:all .15s;color:#c0a8e8;}
.sbutton.active-purple{background:#2a1a4a;color:#9b5de5;border-color:#7b3ab5;}
.sbutton.active-green{background:#e6f4ec;color:#1a7a3f;border-color:#1a7a3f;}
.sbutton.active-red{background:#fdecea;color:#c0392b;border-color:#c0392b;}
.sbutton.active-orange{background:#fff8e6;color:#b07800;border-color:#b07800;}
.status-dropdown{position:relative;display:inline-block;}
.status-dropdown-menu{position:absolute;top:100%;left:0;z-index:200;background:#131f2e;border:1px solid #3a2a5a;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);min-width:220px;padding:4px 0;margin-top:4px;display:none;}
.status-dropdown-menu.open{display:block;}
.status-option{padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;color:#c0a8e8;}
.status-option:hover{background:#2a1a5f;}
.status-option.current{font-weight:600;color:#9b5de5;}
.status-saving{font-size:11px;color:#5a4a7a;padding:7px 14px;}
.preview-panel{width:440px;min-width:440px;border-left:1px solid #2a1a4a;background:#1a1535;display:flex;flex-direction:column;overflow:hidden;}
.preview-header{padding:10px 14px;font-size:11px;font-weight:700;color:#7a5aa8;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #2a1a4a;background:#1a1535;display:flex;justify-content:space-between;align-items:center;}
.preview-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.preview-thumb{border-radius:6px;overflow:hidden;background:#2a1a4a;cursor:pointer;}
.preview-thumb img{width:100%;max-height:400px;object-fit:contain;background:#0d1020;display:block;}
.preview-thumb-label{font-size:11px;color:#7a5aa8;padding:5px 8px;background:#1e1040;}
.preview-doc{border-radius:6px;border:1px solid #3a2a5a;background:#2a1a4a;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.preview-doc:hover{background:#3a2a6a;}
.preview-doc-icon{font-size:26px;flex-shrink:0;}
.preview-doc-info{flex:1;min-width:0;}
.preview-doc-name{font-size:12px;font-weight:500;color:#e0eaf5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.preview-doc-sub{font-size:10px;color:#6a4a8a;margin-top:2px;}
.preview-empty{text-align:center;color:#5a4a7a;font-size:12px;padding:40px 20px;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lightbox-img{max-width:85vw;max-height:75vh;width:auto;height:auto;border-radius:6px;object-fit:contain;}
.lightbox-nav{display:flex;align-items:center;gap:20px;margin-top:16px;}
.lightbox-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lightbox-btn:hover{background:rgba(255,255,255,.3);}
.lightbox-counter{color:#aaa;font-size:12px;min-width:60px;text-align:center;}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}
</style>
</head>

async function gql(q){
  const r=await fetch(PROXY+encodeURIComponent("https://api.monday.com/v2"),{method:"POST",headers:{"Content-Type":"application/json","Authorization":TOKEN},body:JSON.stringify({query:q})});
  return r.json();
}

function getVal(cols,id){
  const c=cols.find(x=>x.id===id);
  if(!c) return "";
  if(id==="files"||id==="files9") return c.value||"";
  try{const v=JSON.parse(c.value);if(v===null) return "";if(typeof v==="string") return v;if(v.text) return v.text;if(v.name) return v.name;if(Array.isArray(v)) return v.map(x=>x.name||x).join(", ");return c.text||"";}catch(e){return c.text||"";}
}

async function fetchBoard(boardId,colMap,dateFilter){
  let all=[],cursor=null;
  for(let p=0;p<30;p++){
    let q;
    if(cursor) q="{next_items_page(limit:100,cursor:\""+cursor+"\"){cursor items{id name column_values{id text value}}}}";
    else if(dateFilter) q="{boards(ids:"+boardId+"){items_page(limit:100,query_params:{rules:[{column_id:\"date4\",compare_value:[\""+dateFilter+"\"],operator:greater_than_or_equals}]}){cursor items{id name column_values{id text value}}}}}";
    else q="{boards(ids:"+boardId+"){items_page(limit:100){cursor items{id name column_values{id text value}}}}}";
    const data=await gql(q);
    const pd=cursor?data?.data?.next_items_page:data?.data?.boards?.[0]?.items_page;
    if(!pd||!pd.items||!pd.items.length) break;
    all=all.concat(pd.items.map(item=>{const r={id:item.id,name:item.name};Object.entries(colMap).forEach(function(e){r[e[0]]=getVal(item.column_values,e[1]);});return r;}));
    if(!pd.cursor) break;
    cursor=pd.cursor;
  }
  return all;
}

function cleanNarrative(parts){return parts.filter(Boolean).map(p=>p.replace(/^\*?\s*cont\.?\s*\*?\s*/gi,"").trim()).filter(Boolean).join("\n\n");}
function strip(text){if(!text||text==="—") return "";return text.replace(/\n\.\n/g,"\n\n").replace(/^\s*\.\s*\n/g,"").replace(/\n\s*\.\s*$/g,"").trim();}

function getLinkedVR(r){return vrItems.filter(function(vr){if(vr.linkedIRId&&String(vr.linkedIRId).trim()===String(r.id).trim()) return true;if(vr.linkedCaseId&&r.caseId&&String(vr.linkedCaseId).trim().toLowerCase()===String(r.caseId).trim().toLowerCase()) return true;return false;});}
function getLinkedDS(r){return dsItems.filter(function(ds){return(ds.incidentReport&&ds.incidentReport===r.id)||(r.caseId&&ds.incidentReport===r.caseId);});}

    if(q&&![(r.caseId||""),(r.branch||""),(r.subjectName||""),displayName(r)].some(function(s){return s.toLowerCase().includes(q);})) return false;
    if(fb&&r.branch!==fb) return false;

async function fetchDetail(id){
  if(detailCache[id]){
    const cached=Object.assign({},detailCache[id]);
    delete cached.documents;delete cached.pictures;
    if(detailCache[id].documents||detailCache[id].pictures){
      const data=await gql("{items(ids:["+id+"]){id name column_values{id text value}}}");
      const item=data?.data?.items?.[0];
      if(item){cached.documents=getVal(item.column_values,"files");cached.pictures=getVal(item.column_values,"files9");}
    }
    return cached;
  }
  const data=await gql("{items(ids:["+id+"]){id name column_values{id text value}}}");
  const item=data?.data?.items?.[0];
  if(!item) return null;
  const detail={id:item.id,name:item.name};
  Object.entries(HR_COLS).forEach(function(e){detail[e[0]]=getVal(item.column_values,e[1]);});
  const existing=hrItems.find(function(x){return x.id===id;});
  if(existing) Object.assign(existing,detail);
  detailCache[id]=detail;
  return detail;
}

  const files=[];
  function parseFiles(raw){if(!raw||raw==="—"||raw==="") return;try{const parsed=JSON.parse(raw);const arr=parsed.files||(Array.isArray(parsed)?parsed:[]);arr.forEach(function(f){files.push({assetId:f.assetId,name:f.name||"File",isImage:f.isImage==="true"||f.isImage===true||/\.jfif$/i.test(f.name||'')});});}catch(e){}}
  parseFiles(r.documents);parseFiles(r.pictures);
  if(r.oneDriveLink&&r.oneDriveLink!=="—") files.push({url:r.oneDriveLink,name:"OneDrive Video",isImage:false,isSP:true});
  count.textContent=files.length?files.length+" file"+(files.length>1?"s":""):"";
  if(!files.length){body.innerHTML="<div class='preview-empty'>No files attached</div>";return;}
  const assetIds=files.filter(function(f){return f.assetId;}).map(function(f){return f.assetId;});
  if(assetIds.length){try{const data=await gql("{assets(ids:["+assetIds.join(",")+"]){id public_url name}}");const assets=data?.data?.assets||[];assets.forEach(function(a){const f=files.find(function(x){return String(x.assetId)===String(a.id);});if(!f||!a.public_url) return;if(f.isImage){f.url="https://images.weserv.nl/?url="+encodeURIComponent(a.public_url.replace(/^https:\/\//,""));f.directUrl=a.public_url;}else{f.url=a.public_url;}});}catch(e){}}
  const imageFiles=files.filter(function(f){return f.url&&f.isImage;});
  window.currentImageFiles=imageFiles;
  body.innerHTML=files.map(function(f){
    if(!f.url) return "";
    const imgIdx=imageFiles.findIndex(function(x){return x===f;});
    if(f.isSP) return "<a class='preview-doc' href='"+f.url+"' target='_blank'><div class='preview-doc-icon'>🎬</div><div class='preview-doc-info'><div class='preview-doc-name'>"+f.name+"</div><div class='preview-doc-sub'>Open video</div></div></a>";

  }).join("");
}

let colOptCache={};
async function fetchColOpts(colId){
  if(colOptCache[colId]) return colOptCache[colId];
  try{const data=await gql("{boards(ids:"+HR_BOARD+"){columns(ids:[\""+colId+"\"]){settings_str}}}");const s=JSON.parse(data?.data?.boards?.[0]?.columns?.[0]?.settings_str||"{}");const opts=Object.values(s.labels||{}).filter(Boolean);colOptCache[colId]=opts;return opts;}catch(e){return [];}
}

function toggleDD(ddId,e){
  e.stopPropagation();
  const dd=document.getElementById(ddId);
  const isOpen=dd.classList.contains("open");
  document.querySelectorAll(".status-dropdown-menu").forEach(function(el){el.classList.remove("open");});
  if(!isOpen){dd.classList.add("open");populateDD(ddId);}
}
document.addEventListener("click",function(){document.querySelectorAll(".status-dropdown-menu").forEach(function(el){el.classList.remove("open");});});

async function populateDD(ddId){
  if(!selectedId) return;
  const r=hrItems.find(function(x){return x.id===selectedId;});if(!r) return;
  const dd=document.getElementById(ddId);
  dd.innerHTML="<div class='status-saving'>Loading...</div>";
  const MAP={"dd-ap":{colId:"dup__of_hr_decision____1",prop:"apFollowUp"},"dd-hr":{colId:"status_1__1",prop:"hrRec"},"dd-hrrec":{colId:"color_mm0fehr4",prop:"hrRecommendation"},"dd-hrrec-local":{colId:"color_mm0fehr4",prop:"hrRecommendation"},"dd-ownership":{colId:"color_mm0q8n2x",prop:"currentOwnership"}};
  const entry=MAP[ddId];if(!entry){dd.innerHTML="<div class='status-saving'>Not available</div>";return;}
  const opts=await fetchColOpts(entry.colId);
  if(!opts.length){dd.innerHTML="<div class='status-saving'>No options</div>";return;}
  const current=r[entry.prop];
  dd.innerHTML=opts.map(function(opt){const isCur=opt===current;return "<div class='status-option"+(isCur?" current":"")+"' onclick='selectStatus(\""+ddId+"\",\""+entry.colId+"\",\""+entry.prop+"\",\""+opt.replace(/"/g,"&quot;")+"\")'>"+( isCur?"✓ ":"")+opt+"</div>";}).join("");
}

async function selectStatus(ddId,colId,prop,value){
  if(!selectedId) return;
  const r=hrItems.find(function(x){return x.id===selectedId;});if(!r) return;
  document.getElementById(ddId).innerHTML="<div class='status-saving'>Saving...</div>";
  const ok=await updateColumn(selectedId,colId,value,"status");
  document.getElementById(ddId).classList.remove("open");
  if(ok){r[prop]=value;updateStatusBar(r);renderList();if(selectedId) renderDetail(r);}
  else alert("Save failed.");
}

// Cache
const CK="rusa_hr_cache",CKT="rusa_hr_cache_ts",CMA=30*60*1000;
function saveCache(hr,vr,ds){try{localStorage.setItem(CK,JSON.stringify({hr,vr,ds}));localStorage.setItem(CKT,Date.now().toString());}catch(e){}}
function loadCache(){try{const ts=parseInt(localStorage.getItem(CKT)||"0");const age=Date.now()-ts;const raw=localStorage.getItem(CK);if(!raw) return null;return{data:JSON.parse(raw),age,isStale:age>CMA};}catch(e){return null;}}
function clearCache(){localStorage.removeItem(CK);localStorage.removeItem(CKT);}
function getDateFilter(d){const dt=new Date();dt.setDate(dt.getDate()-d);return dt.toISOString().split("T")[0];}

async function refreshAll(){clearCache();document.getElementById("live-badge").textContent="● Refreshing...";detailCache={};await init();}

async function init(){
  const cached=loadCache();
  if(cached&&!cached.isStale){
    hrItems=cached.data.hr;vrItems=cached.data.vr||[];dsItems=cached.data.ds||[];
    document.getElementById("live-badge").textContent="● "+hrItems.length+" HR cases (cached)";
    populateFilters();renderList();refreshBG();return;
  }
  if(cached&&cached.isStale){
    hrItems=cached.data.hr;vrItems=cached.data.vr||[];dsItems=cached.data.ds||[];
    document.getElementById("live-badge").textContent="● "+hrItems.length+" HR cases (updating…)";
    populateFilters();renderList();refreshBG();return;
  }
  try{
    const df=getDateFilter(90);
    hrItems=await fetchBoard(HR_BOARD,HR_LIST_COLS,df);
    document.getElementById("live-badge").textContent="● "+hrItems.length+" HR cases";
    populateFilters();renderList();
    const [vr,ds]=await Promise.all([fetchBoard(VR_BOARD,VR_COLS,df),fetchBoard(DS_BOARD,DS_COLS,df)]);
    vrItems=vr;dsItems=ds;
    saveCache(hrItems,vrItems,dsItems);
  }catch(e){document.getElementById("list-panel").innerHTML="<div class=\"err-msg\">Error: "+e.message+"</div>";document.getElementById("live-badge").textContent="● Error";}
}

async function refreshBG(){
  try{
    const df=getDateFilter(90);
    const [hr,vr,ds]=await Promise.all([fetchBoard(HR_BOARD,HR_LIST_COLS,df),fetchBoard(VR_BOARD,VR_COLS,df),fetchBoard(DS_BOARD,DS_COLS,df)]);
    hrItems=hr;vrItems=vr;dsItems=ds;detailCache={};
    saveCache(hrItems,vrItems,dsItems);
    document.getElementById("live-badge").textContent="● Live — "+hrItems.length+" HR cases";
    populateFilters();renderList();
  }catch(e){document.getElementById("live-badge").textContent="● Live (refresh failed)";}
}

(function(){
  function makeResizer(rId,pId,sk,side){const res=document.getElementById(rId),pan=document.getElementById(pId);if(!res||!pan) return;const def=pId==="list-panel"?310:440;pan.style.width=(parseInt(localStorage.getItem(sk))||def)+"px";pan.style.minWidth="150px";let sx,sw;res.addEventListener("mousedown",function(e){sx=e.clientX;sw=pan.offsetWidth;res.classList.add("dragging");document.body.style.cursor="col-resize";document.body.style.userSelect="none";function om(e){const dx=side==="left"?e.clientX-sx:sx-e.clientX;pan.style.width=Math.max(150,Math.min(700,sw+dx))+"px";}function ou(){res.classList.remove("dragging");document.body.style.cursor="";document.body.style.userSelect="";localStorage.setItem(sk,pan.offsetWidth);document.removeEventListener("mousemove",om);document.removeEventListener("mouseup",ou);}document.addEventListener("mousemove",om);document.addEventListener("mouseup",ou);e.preventDefault();});res.addEventListener("dblclick",function(){pan.style.width=def+"px";localStorage.setItem(sk,def);});}
  makeResizer("resizer-left","list-panel","hr_list_w","left");
  makeResizer("resizer-right","preview-panel","hr_preview_w","right");
})();
