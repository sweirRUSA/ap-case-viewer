<script>
// ── SESSION CHECK ──────────────────────────────────────────
const BACKEND = (function() {
  // Use localhost when running locally, tunnel URL when on GitHub Pages
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    return 'http://localhost:3000';
  }
  return 'https://liz-enabling-sparc-four.trycloudflare.com';
})();
let AP_USER = null;
let AP_TOKEN = null;

(async function checkSession() {
  AP_TOKEN = localStorage.getItem('ap_token');
  if (!AP_TOKEN) { if (!window.location.pathname.endsWith('login.html')) window.location.href = 'login.html'; return; }
  try {
    const r = await fetch(BACKEND + '/api/session', {
      headers: { 'x-session-token': AP_TOKEN }
    });
    if (!r.ok) { window.location.href = 'login.html'; return; }
    const data = await r.json();
    AP_USER = data.user;
    // Check module access
    const module = document.body.getAttribute('data-module');
    if (module && !AP_USER.access[module]) {
      window.location.href = 'index.html';
      return;
    }
    // Show user name in header
    const badge = document.getElementById('user-badge');
    if (badge) badge.textContent = AP_USER.name;
    // Hide write controls if read-only
    if (module && AP_USER.access[module] === 'R') {
      document.querySelectorAll('.write-only').forEach(el => el.style.display = 'none');
    }
  } catch(e) {
    window.location.href = 'login.html';
  }
})();

async function doLogout() {
  await fetch(BACKEND + '/api/logout', {
    method: 'POST',
    headers: { 'x-session-token': AP_TOKEN }
  });
  localStorage.removeItem('ap_token');
  localStorage.removeItem('ap_user');
  window.location.href = 'login.html';
}

</script>

<script>─const BACKEND_URL = "https://liz-enabling-sparc-four.trycloudflare.com";
let apUser = null;

async function checkSession(moduleKey) {
  const token = localStorage.getItem("ap_token");
  if (!token) { window.location.href = "login.html"; return false; }
  try {
    const r = await fetch(BACKEND_URL + "/api/session", { headers: {"x-session-token": token} });
    if (!r.ok) { window.location.href = "login.html"; return false; }
    const data = await r.json();
    apUser = data.user;
    const access = apUser.access[moduleKey] || "";
    if (!access) { window.location.href = "index.html"; return false; }
    const badge = document.getElementById("user-badge");
    if (badge) badge.textContent = apUser.name;
    if (access === "R") { setTimeout(applyReadOnly, 1500); }
    return true;
  } catch(e) { window.location.href = "login.html"; return false; }
}

function applyReadOnly() {
  document.querySelectorAll(".btn-primary,.sbutton,.fedit-actions").forEach(function(el) {
    el.style.display = "none";
  });
}

async function doLogout() {
  const token = localStorage.getItem("ap_token");
  try { await fetch(BACKEND_URL + "/api/logout", { method:"POST", headers:{"x-session-token":token} }); } catch(e) {}
  localStorage.removeItem("ap_token");
  localStorage.removeItem("ap_user");
  window.location.href = "login.html";
}

const TOKEN = "unused";
const PROXY = "https://liz-enabling-sparc-four.trycloudflare.com/api/monday?query=";
const VR_BOARD = "992178387";
let vrItems = [], selectedId = null;

const VR_COLS = {
  agency:"status6", status:"status", assigned:"person",
  branch:"dropdown0", incidentDate:"date4", incidentTime:"text19",
  submittedDate:"date0", submittedBy:"primary_contributor",
  requestNarrative:"long_text",
  oneDriveLink:"main_office_supplement",
  sscSupplement:"text_mm032dsj",
  leContact:"submitted_by", leEmail:"le_contact_name", lePhone:"le_email_address",
  reviewDecision:"status_1__1",
  incidentCategory:"incident_category", location:"text8",
  dateCompleted:"date__1",
  linkedIRId:"text_mkwz2hhp", linkedCaseId:"text_mm0q7wkt"
};


// ── ACTIVITY LOGGING ──────────────────────────────────────
async function logActivity(action, target, detail) {
  const token = localStorage.getItem('ap_token');
  if (!token) return;
  try {
    await fetch('https://liz-enabling-sparc-four.trycloudflare.com/api/log', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-session-token':token},
      body: JSON.stringify({action, target, detail})
    });
  } catch(e) {}
}
async function gql(q) {
  const r = await fetch("https://liz-enabling-sparc-four.trycloudflare.com/api/monday",{
    method:"POST",headers:{"Content-Type":"application/json","x-api-key":"rusa-ap-2026"},
    body:JSON.stringify({query:q})
  });
  return r.json();
}

function getVal(cols,id) {
  const c=cols.find(x=>x.id===id);
  if(!c) return "";
  try{const v=JSON.parse(c.value);if(v===null)return "";if(typeof v==="string")return v;if(v.text)return v.text;if(v.name)return v.name;return c.text||"";}catch(e){return c.text||"";}
}

function badgeCls(s) {
  if(!s) return "bg-gray";
  const l=s.toLowerCase();
  if(l.includes("complet")) return "bg-green";
  if(l.includes("progress")) return "bg-orange";
  if(l.includes("needed")||l.includes("action")) return "bg-red";
  return "bg-gray";
}

async function loadData() {
  if (!await checkSession("vr")) return;
    if (!await checkSession()) return;
  const df = new Date(); df.setDate(df.getDate()-60);
  const dateFilter = df.toISOString().split("T")[0];
  let all=[],cursor=null;
  for(let p=0;p<20;p++) {
    let q;
    if(cursor) q=`{next_items_page(limit:100,cursor:"${cursor}"){cursor items{id name column_values{id text value}}}}`;
    else q=`{boards(ids:${VR_BOARD}){items_page(limit:100,query_params:{rules:[{column_id:"date4",compare_value:["${dateFilter}"],operator:greater_than_or_equals}]}){cursor items{id name column_values{id text value}}}}}`;
    const data=await gql(q);
    const pd=cursor?data?.data?.next_items_page:data?.data?.boards?.[0]?.items_page;
    if(!pd||!pd.items||!pd.items.length) break;
    all=all.concat(pd.items.map(item=>{
      const r={id:item.id,name:item.name};
      Object.entries(VR_COLS).forEach(e=>{r[e[0]]=getVal(item.column_values,e[1]);});
      return r;
    }));
    if(!pd.cursor) break;
    cursor=pd.cursor;
  }
  vrItems=all.sort((a,b)=>(b.incidentDate||"").localeCompare(a.incidentDate||""));
  document.getElementById("live-badge").textContent="● Live — "+vrItems.length+" requests";
  populateFilters();
  renderList();
}

function populateFilters() {
  const branches=[...new Set(vrItems.map(r=>r.branch).filter(Boolean))].sort();
  const statuses=[...new Set(vrItems.map(r=>r.status).filter(Boolean))].sort();
  const agencies=[...new Set(vrItems.map(r=>r.agency).filter(Boolean))].sort();
  function addOpts(id,arr){const el=document.getElementById(id);arr.forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;el.appendChild(o);});}
  addOpts("f-branch",branches);addOpts("f-status",statuses);addOpts("f-agency",agencies);
}

function clearFilters(){["f-branch","f-status","f-agency","search"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});renderList();}

function renderList() {
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fb=document.getElementById("f-branch").value;
  const fs=document.getElementById("f-status").value;
  const fa=document.getElementById("f-agency").value;
  const filtered=vrItems.filter(r=>{
    if(q&&![r.name,r.branch,r.agency,r.linkedCaseId].some(s=>(s||"").toLowerCase().includes(q))) return false;
    if(fb&&r.branch!==fb) return false;
    if(fs&&r.status!==fs) return false;
    if(fa&&r.agency!==fa) return false;
    return true;
  });
  const panel=document.getElementById("list-panel");
  if(!filtered.length){panel.innerHTML="<div class='empty'>No requests match filters.</div>";return;}
  panel.innerHTML=filtered.map(r=>
    `<div class="list-item ${selectedId===r.id?"active":""}" onclick="selectItem('${r.id}')">
      <div class="item-name">${r.agency||r.name}</div>
      <div class="item-caseid">${r.linkedCaseId||r.linkedIRId||"No case linked"}</div>
      <div class="item-meta">
        <span><span class="lbl">Branch </span>${r.branch||"—"}</span>
        <span><span class="lbl">Date </span>${r.incidentDate||"—"}</span>
        <span><span class="lbl">Status </span>${r.status||"—"}</span>
        <span><span class="lbl">Assigned </span>${r.assigned||"—"}</span>
      </div>
    </div>`
  ).join("");
}

function selectItem(id) {
  selectedId=id;
  renderList();
  const r=vrItems.find(x=>x.id===id);
  if(r){renderDetail(r);updateStatusBar(r);}
}

function updateStatusBar(r) {
  document.getElementById("status-bar").style.display="flex";
  function setBtn(id,lbl,val,cls){
    const el=document.getElementById(id);
    if(el){el.textContent=lbl+": "+(val||"—");el.className="sbutton"+(cls?" "+cls:"");}
  }
  setBtn("sb-status","Status",r.status,r.status&&r.status.toLowerCase().includes("complet")?"active-green":r.status&&r.status.toLowerCase().includes("progress")?"active-orange":"");
  setBtn("sb-agency","Agency",r.agency,"");
  setBtn("sb-review","Review Decision",r.reviewDecision,r.reviewDecision?"active-blue":"");
}

function renderDetail(r) {
  document.getElementById("detail-panel").innerHTML=`
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-name">${r.agency||"Video Request"}</div>
          <div class="card-sub">${r.linkedCaseId||r.linkedIRId||""} · ${r.branch||""} · ${r.incidentDate||""}</div>
        </div>
        <div class="card-actions">
          <span class="badge ${badgeCls(r.status)}">${r.status||"—"}</span>
          <button class="btn-small" onclick="showActivityLog('${r.id}','992178387','${r.agency||r.id}')">📋 Activity Log</button>
        </div>
      </div>
      <div class="sec"><div class="sec-title">Overview</div><div class="fgrid">
        <div class="f"><div class="flabel">Agency</div><div class="fval">${r.agency||"—"}</div></div>
        <div class="f"><div class="flabel">Assigned to</div><div class="fval">${r.assigned||"—"}</div></div>
        <div class="f"><div class="flabel">Branch</div><div class="fval">${r.branch||"—"}</div></div>
        <div class="f"><div class="flabel">Incident date</div><div class="fval">${r.incidentDate||"—"}</div></div>
        <div class="f"><div class="flabel">Submitted date</div><div class="fval">${r.submittedDate||"—"}</div></div>
        <div class="f"><div class="flabel">Submitted by</div><div class="fval">${r.submittedBy||"—"}</div></div>
        <div class="f"><div class="flabel">Location</div><div class="fval">${r.location||"—"}</div></div>
        <div class="f"><div class="flabel">Category</div><div class="fval">${r.incidentCategory||"—"}</div></div>
        <div class="f"><div class="flabel">Date completed</div><div class="fval">${r.dateCompleted||"—"}</div></div>
        <div class="f"><div class="flabel">Review decision</div><div class="fval">${r.reviewDecision||"—"}</div></div>
        <div class="f"><div class="flabel">Linked IR</div><div class="fval">${r.linkedCaseId||r.linkedIRId||"—"}</div></div>
      </div></div>
      <div class="sec"><div class="sec-title">Request Narrative</div><div class="narr">${r.requestNarrative||"—"}</div></div>
      <div class="sec"><div class="sec-title">AP Findings on Video Request</div>
        <textarea id="edit-ssc" style="width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-family:inherit;resize:vertical;background:#0f1923;color:#e0eaf5;">${r.sscSupplement||""}</textarea>
        <div class="fedit-actions">
          <button class="btn-primary btn-small" onclick="saveSSC('${r.id}')">Save to Monday</button>
          <span id="msg-ssc" class="save-msg"></span>
        </div>
      </div>
      ${r.leContact||r.leEmail||r.lePhone?`<div class="sec"><div class="sec-title">Law Enforcement Contact</div><div class="fgrid">
        <div class="f"><div class="flabel">Contact</div><div class="fval">${r.leContact||"—"}</div></div>
        <div class="f"><div class="flabel">Email</div><div class="fval">${r.leEmail||"—"}</div></div>
        <div class="f"><div class="flabel">Phone</div><div class="fval">${r.lePhone||"—"}</div></div>
      </div></div>`:"" }
      ${r.oneDriveLink&&r.oneDriveLink!=="—"?`<div class="sec"><div class="sec-title">Video Link</div>
        <a href="${r.oneDriveLink}" target="_blank" style="color:#5a9fd4;font-size:13px;">🎬 Open Video</a></div>`:""}
    </div>`;
}

async function saveSSC(itemId) {
  const val=document.getElementById("edit-ssc").value;
  const escaped=val.replace(/\\/g,"\\\\").replace(/"/g,'\\"').replace(/\n/g,"\\n");
  const mut=`mutation{change_simple_column_value(board_id:${VR_BOARD},item_id:${itemId},column_id:"text_mm032dsj",value:"${escaped}"){id}}`;
  const res=await gql(mut);
  const ok=!!res?.data?.change_simple_column_value?.id;
  const el=document.getElementById("msg-ssc");
  if(el){el.textContent=ok?"Saved":"Failed";el.className="save-msg "+(ok?"ok":"err");setTimeout(()=>el.textContent="",3000);}
  if(ok){const item=vrItems.find(x=>x.id===itemId);if(item)item.sscSupplement=val;}
}

function toggleDD(ddId,e) {
  e.stopPropagation();
  document.querySelectorAll(".status-dropdown-menu.open").forEach(el=>{if(el.id!==ddId)el.classList.remove("open");});
  const dd=document.getElementById(ddId);
  if(!dd.classList.contains("open")){dd.classList.add("open");populateDD(ddId);}
  else dd.classList.remove("open");
}
document.addEventListener("click",()=>document.querySelectorAll(".status-dropdown-menu.open").forEach(el=>el.classList.remove("open")));

async function populateDD(ddId) {
  if(!selectedId) return;
  const r=vrItems.find(x=>x.id===selectedId);
  if(!r) return;
  const dd=document.getElementById(ddId);
  dd.innerHTML="<div class='status-saving'>Loading...</div>";
  const MAP={
    "dd-status":{colId:"status",prop:"status"},
    "dd-agency":{colId:"status6",prop:"agency"},
    "dd-review":{colId:"status_1__1",prop:"reviewDecision"}
  };
  const entry=MAP[ddId];
  if(!entry)return;
  const q=`{boards(ids:${VR_BOARD}){columns(ids:["${entry.colId}"]){settings_str}}}`;
  const data=await gql(q);
  let opts=[];
  try{const s=JSON.parse(data?.data?.boards?.[0]?.columns?.[0]?.settings_str||"{}");opts=(s.labels||[]).map(l=>l.name).filter(Boolean);}catch(e){}
  if(!opts.length){dd.innerHTML="<div class='status-saving'>No options</div>";return;}
  const current=r[entry.prop];
  dd.innerHTML=opts.map(opt=>{
    const isCurrent=opt===current;
    const l=opt.toLowerCase();
    const fg=l.includes("complet")||l.includes("yes")||l.includes("approv")?"#4caf80":l.includes("progress")||l.includes("pending")?"#e0a030":l.includes("needed")||l.includes("no")||l.includes("terminat")?"#e05050":"#c0d4e8";
    return `<div class="status-option${isCurrent?" current":""}" style="color:${fg};" onclick="selectStatus('${ddId}','${entry.colId}','${entry.prop}','${opt.replace(/'/g,"\\'")}')">${isCurrent?"✓ ":""}${opt}</div>`;
  }).join("");
}

async function selectStatus(ddId,colId,prop,value) {
  if(!selectedId) return;
  const r=vrItems.find(x=>x.id===selectedId);
  const dd=document.getElementById(ddId);
  dd.innerHTML="<div class='status-saving'>Saving...</div>";
  const colVal=JSON.stringify(JSON.stringify({label:value}));
  const mut=`mutation{change_column_value(board_id:${VR_BOARD},item_id:${selectedId},column_id:"${colId}",value:${colVal}){id}}`;
  const res=await gql(mut);
  const ok=!!res?.data?.change_column_value?.id;
  dd.classList.remove("open");
  if(ok){r[prop]=value;updateStatusBar(r);renderDetail(r);renderList();}
  else alert("Save failed — please try again.");
}

loadData();
</script>

<!-- Activity Log Modal -->
<div id="activity-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#131f2e;border:1px solid #2d3f55;border-radius:12px;width:90%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #1e2e40;">
      <div>
        <div style="font-size:14px;font-weight:600;color:#e0eaf5;">📋 Activity Log</div>
        <div id="activity-modal-sub" style="font-size:11px;color:#4a6a8a;margin-top:2px;"></div>
      </div>
      <button onclick="hideActivityLog()" style="background:transparent;border:none;color:#8fa8c0;font-size:18px;cursor:pointer;padding:4px 8px;">✕</button>
    </div>
    <div id="activity-modal-body" style="overflow-y:auto;padding:16px 20px;flex:1;">
      <div style="color:#4a6a8a;font-size:12px;">Loading...</div>
    </div>
  </div>
</div>

<script>
async function showActivityLog(itemId, boardId, name) {
  const modal = document.getElementById("activity-modal");
  const body = document.getElementById("activity-modal-body");
  const sub = document.getElementById("activity-modal-sub");
  modal.style.display = "flex";
  sub.textContent = name;
  body.innerHTML = "<div style='color:#4a6a8a;font-size:12px;'>Loading activity log...</div>";
  try {
    const q = "{boards(ids:"+boardId+"){activity_logs(item_ids:["+itemId+"],limit:50){id event data created_at}}}";
    const r = await fetch("https://liz-enabling-sparc-four.trycloudflare.com/api/monday",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":"rusa-ap-2026"},body:JSON.stringify({query:q})});
    const data = await r.json();
    const logs = data?.data?.boards?.[0]?.activity_logs || [];
    if (!logs.length) { body.innerHTML = "<div style='color:#4a6a8a;font-size:12px;font-style:italic;'>No activity found.</div>"; return; }
    body.innerHTML = logs.map(function(log) {
      let parsed = {};
      try { parsed = JSON.parse(log.data||"{}"); } catch(e){}
      let date = "—";
      if (log.created_at) {
        const d = new Date(parseInt(log.created_at));
        if (!isNaN(d.getTime())) date = d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) + " " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      }
      function extractVal(v) { if (!v) return ""; if (typeof v==="string") return v; if (v.label&&v.label.text) return v.label.text; if (v.name) return v.name; if (v.text) return v.text; return String(v); }
      const newVal = extractVal(parsed.value)||extractVal(parsed.to)||"—";
      const prevVal = extractVal(parsed.previous_value)||extractVal(parsed.from)||"";
      const evt = (log.event||"").toLowerCase();
      let desc = "";
      if (evt.includes("update_column")||evt.includes("change_column")) desc = "<strong>"+(parsed.column_title||"field")+"</strong> → <span style='color:#4caf80;'>"+newVal+"</span>"+(prevVal?" <span style='color:#4a6a8a;'>(was: "+prevVal+")</span>":"");
      else if (evt.includes("create")) desc = "<span style='color:#5a9fd4;'>Item created</span>";
      else if (evt.includes("add_file")) desc = "<span style='color:#e0a030;'>File attached</span>";
      else if (evt.includes("add_update")||evt.includes("create_update")) desc = "<span style='color:#c0d4e8;'>Comment added</span>";
      else desc = "<span style='color:#6a8aaa;'>"+log.event+"</span>";
      return "<div style='padding:8px 0;border-bottom:1px solid #1a2535;display:flex;gap:12px;align-items:flex-start;'><span style='color:#4a6a8a;white-space:nowrap;font-size:10px;min-width:140px;margin-top:1px;'>"+date+"</span><span style='flex:1;font-size:12px;color:#c0d4e8;'>"+desc+"</span></div>";
    }).join("");
  } catch(e) { body.innerHTML = "<div style='color:#e05050;font-size:12px;'>Error: "+e.message+"</div>"; }
}
function hideActivityLog() { document.getElementById("activity-modal").style.display = "none"; }
document.addEventListener("click", function(e) { const m=document.getElementById("activity-modal"); if(m&&e.target===m) hideActivityLog(); });
</script>
