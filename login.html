<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA — Asset Protection Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',Arial,sans-serif;background:#353942;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:420px;padding:20px;}
.login-card{background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.login-header{background:#353942;padding:32px 40px 28px;text-align:center;border-bottom:4px solid #f56200;}
.login-header img{height:56px;object-fit:contain;margin-bottom:16px;}
.login-header h1{color:#ffffff;font-size:18px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
.login-header p{color:#f1efef;font-size:13px;margin-top:4px;opacity:0.8;}
.login-body{padding:36px 40px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:13px;font-weight:700;color:#353942;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input{width:100%;padding:12px 14px;border:2px solid #f1efef;border-radius:6px;font-size:15px;font-family:'Roboto',Arial,sans-serif;color:#353942;background:#ffffff;transition:border-color 0.2s;}
.form-group input:focus{outline:none;border-color:#f56200;}
.btn-login{width:100%;padding:14px;background:#f56200;color:#ffffff;border:none;border-radius:6px;font-size:16px;font-weight:700;font-family:'Roboto',Arial,sans-serif;cursor:pointer;transition:background 0.2s;margin-top:8px;}
.btn-login:hover{background:#d45500;}
.btn-login:disabled{background:#ccc;cursor:not-allowed;}
.error-msg{background:#fff0f0;border:1px solid #ffcccc;border-radius:6px;padding:10px 14px;color:#cc0000;font-size:13px;margin-bottom:16px;display:none;}
.login-footer{text-align:center;padding:16px 40px 24px;font-size:12px;color:#999;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <img src="RUSALogo.png" alt="Range USA" onerror="this.style.display='none'"/>
      <h1>Asset Protection Portal</h1>
      <p>Authorized personnel only</p>
    </div>
    <div class="login-body">
      <div class="error-msg" id="error-msg"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in</button>
    </div>
    <div class="login-footer">Range USA Asset Protection — Internal use only</div>
  </div>
</div>
<script>
var BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://liz-enabling-sparc-four.trycloudflare.com';

async function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('error-msg');
  if (!username || !password) {
    err.textContent = 'Please enter your username and password.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.style.display = 'none';
  try {
    var r = await fetch(BACKEND + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: username, password: password})
    });
    var data = await r.json();
    if (!r.ok) {
      err.textContent = data.error || 'Login failed. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }
    localStorage.setItem('ap_token', data.token);
    localStorage.setItem('ap_user', JSON.stringify(data.user));
    window.location.href = 'index.html';
  } catch(e) {
    err.textContent = 'Cannot connect to server. Please check your connection.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
