<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA — Asset Protection Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#353942;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:12px;padding:40px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
h1{color:#353942;font-size:20px;margin-bottom:24px;text-align:center;text-transform:uppercase;}
label{display:block;font-size:12px;font-weight:700;color:#353942;margin-bottom:4px;text-transform:uppercase;}
input{width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:6px;font-size:15px;margin-bottom:16px;}
input:focus{outline:none;border-color:#f56200;}
button{width:100%;padding:14px;background:#f56200;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;}
button:disabled{background:#ccc;}
#msg{margin-top:12px;font-size:13px;text-align:center;color:#cc0000;}
#debug{margin-top:12px;font-size:11px;color:#666;word-break:break-all;}
</style>
</head>
<body>
<div class="card">
  <h1>AP Portal Login</h1>
  <label>Username</label>
  <input type="text" id="u" value="SWeir"/>
  <label>Password</label>
  <input type="password" id="p" value="Admin2026!"/>
  <button id="btn" onclick="doLogin()">Sign in</button>
  <div id="msg"></div>
  <div id="debug"></div>
</div>
<script>
var BACKEND = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://jefferson-commons-routing-sky.trycloudflare.com';

document.getElementById('debug').textContent = 'BACKEND: ' + BACKEND;

async function doLogin() {
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  var dbg = document.getElementById('debug');
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  
  btn.disabled = true;
  msg.textContent = 'Connecting...';
  dbg.textContent = 'Calling: ' + BACKEND + '/api/login';
  
  try {
    var r = await fetch(BACKEND + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    
    dbg.textContent = 'HTTP status: ' + r.status;
    var data = await r.json();
    dbg.textContent += ' | Response: ' + JSON.stringify(data).substring(0, 100);
    
    if (!r.ok) {
      msg.textContent = data.error || 'Login failed';
      btn.disabled = false;
      return;
    }
    
    localStorage.setItem('ap_token', data.token);
    localStorage.setItem('ap_user', JSON.stringify(data.user));
    msg.textContent = 'Success! Redirecting...';
    dbg.textContent += ' | Token saved, redirecting to index.html';
    
    setTimeout(function() {
      window.location.href = 'index.html';
    }, 1000);
    
  } catch(e) {
    msg.textContent = 'Error: ' + e.message;
    dbg.textContent = 'CATCH ERROR: ' + e.message;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
