<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Range USA — Deny Service</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1923;color:#e0eaf5;font-size:14px;}
.header{background:#0d1520;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2e40;}
.header-left{display:flex;flex-direction:column;align-items:center;}
.logo{height:50px;object-fit:contain;}
.ap-sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#ffffff;font-weight:700;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.live-badge{font-size:11px;color:#4caf50;letter-spacing:1px;}
.home-btn{font-size:11px;padding:4px 12px;background:transparent;border:1px solid #2d3f55;color:#8fa8c0;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.home-btn:hover{background:#1a2535;color:#e0eaf5;}
.toolbar{display:flex;gap:6px;padding:8px 12px;align-items:center;flex-wrap:wrap;background:#131f2e;border-bottom:1px solid #1e2e40;}
input[type=text],select{padding:6px 10px;border:1px solid #2d3f55;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#1a2535;color:#e0eaf5;}
button{padding:5px 12px;border:1px solid #2d3f55;border-radius:6px;background:#1a2535;font-size:12px;cursor:pointer;font-family:inherit;color:#c0d4e8;}
button:hover{background:#243447;}
.btn-primary{background:#3a7bd5;color:#fff;border-color:#3a7bd5;}
.btn-small{font-size:11px;padding:3px 10px;}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#0d1520;border-bottom:1px solid #1e2e40;align-items:center;}
.status-bar-label{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
.status-dropdown{position:relative;display:inline-block;}
.sbutton{font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1.5px solid #2d3f55;background:#1a2535;font-family:inherit;font-weight:500;color:#c0d4e8;}
.sbutton.active-green{background:#1a3a2a;color:#4caf80;border-color:#2a5a3a;}
.sbutton.active-red{background:#3a1a1a;color:#e05050;border-color:#5a2a2a;}
.sbutton.active-blue{background:#1a2a4a;color:#5a9fd4;border-color:#2a4a7a;}
.sbutton.active-orange{background:#2a2010;color:#e0a030;border-color:#5a4a20;}
.status-dropdown-menu{position:absolute;top:100%;left:0;z-index:200;background:#131f2e;border:1px solid #2d3f55;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);min-width:220px;padding:4px 0;margin-top:4px;display:none;}
.status-dropdown-menu.open{display:block;}
.status-option{padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;color:#c0d4e8;}
.status-option:hover{background:#1e3a5f;}
.status-option.current{font-weight:600;color:#5a9fd4;}
.status-saving{font-size:11px;color:#4a6a8a;padding:7px 14px;}
.main{display:flex;height:calc(100vh - 130px);}
.list{width:320px;min-width:320px;overflow-y:auto;border-right:1px solid #1e2e40;background:#111c2a;}
.list-item{padding:10px 14px;border-bottom:1px solid #1a2535;cursor:pointer;}
.list-item:hover{background:#1a2d42;}
.list-item.active{background:#1e3a5f;border-left:3px solid #3a7bd5;}
.item-name{font-size:12px;font-weight:500;margin-bottom:2px;color:#e0eaf5;}
.item-caseid{font-size:11px;color:#e05050;font-weight:500;margin-bottom:4px;}
.item-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;}
.item-meta span{font-size:10px;color:#7a9ab8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta .lbl{color:#4a6a8a;}
.detail{flex:1;overflow-y:auto;padding:14px;background:#0f1923;}
.card{background:#131f2e;border-radius:10px;border:1px solid #1e2e40;padding:16px 18px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-size:15px;font-weight:600;color:#e0eaf5;}
.card-sub{font-size:11px;color:#4a6a8a;margin-top:2px;}
.card-actions{display:flex;gap:6px;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#5a9fd4;text-transform:uppercase;letter-spacing:.09em;padding-bottom:4px;border-bottom:2px solid #1e3a5f;margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px 16px;}
.f{margin-bottom:2px;}
.f.full{grid-column:1/-1;}
.flabel{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fval{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;color:#c0d4e8;}
.narr{background:#0d1520;padding:10px 12px;border-radius:6px;border:1px solid #1e2e40;white-space:pre-wrap;font-size:13px;line-height:1.7;color:#c0d4e8;}
.fedit textarea{width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-family:inherit;resize:vertical;line-height:1.6;background:#0f1923;color:#e0eaf5;}
.fedit-actions{display:flex;align-items:center;gap:6px;margin-top:4px;}
.save-msg{font-size:11px;}
.save-msg.ok{color:#4caf80;}
.save-msg.err{color:#e05050;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.bg-green{background:#1a3a2a;color:#4caf80;}
.bg-red{background:#3a1a1a;color:#e05050;}
.bg-orange{background:#2a2010;color:#e0a030;}
.bg-gray{background:#1e2e40;color:#8fa8c0;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#4a6a8a;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid #1e2e40;border-top-color:#3a7bd5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#4a6a8a;font-size:13px;}
</style>
</head>

  <select id="f-status" onchange="renderList()"><option value="">All statuses</option></select>
  <select id="f-type" onchange="renderList()"><option value="">All request types</option></select>
  <button onclick="clearFilters()" class="btn-small">Clear filters</button>
</div>

<div class="status-bar" id="status-bar" style="display:none;">
  <span class="status-bar-label">Quick actions:</span>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-status" onclick="toggleDD('dd-status',event)">Status: —</button>
    <div class="status-dropdown-menu" id="dd-status"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-audit" onclick="toggleDD('dd-audit',event)">Audit: —</button>
    <div class="status-dropdown-menu" id="dd-audit"></div>
  </div>
</div>

<div class="main">
  <div class="list" id="list-panel"><div class="loading"><div class="spinner"></div><span>Loading...</span></div></div>
  <div class="detail" id="detail-panel"><div class="empty">Select a record from the list</div></div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0NTkzMzIyMywiYWFpIjoxMSwidWlkIjo1OTA4NDY1LCJpYWQiOiIyMDI2LTA0LTE1VDEyOjI1OjI5LjQ5M1oiLCJwZXIiOiJtZTp3cml0ZSIsImFjdGlkIjoyNjYzMjIyLCJyZ24iOiJ1c2UxIn0.rgL69-eLXXiuFRVqngxm37G0nWb4DB1EvCXS9ROmcKY";
const PROXY = "https://corsproxy.io/?";
const DS_BOARD = "1053253179";
let dsItems = [], selectedId = null;

const DS_COLS = {
  status:"status", branch:"dropdown0", district:"status1",
  subjectFirstName:"text61", subjectLastName:"short_text1__1",
  subjectId:"dup__of_subject_id__",
  nicsNumber:"short_text0__1", requestType:"single_select1__1",
  submittedBy:"primary_contributor", date:"date4",
  lastActionDate:"date_mkvgpk7p",
  narrative:"long_text", apNarrative:"text_mkpxnqe3",
  apNotes:"text95", oneDriveLink:"main_office_supplement",
  incidentReport:"incident__",
  phone:"phone_mkr6t0vm", subjectType:"dropdown6", audit:"color_mkq4smae"
};

async function gql(q) {
  const r = await fetch(PROXY+encodeURIComponent("https://api.monday.com/v2"),{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":TOKEN},
    body:JSON.stringify({query:q})
  });
  return r.json();
}

function getVal(cols,id) {
  const c=cols.find(x=>x.id===id);
  if(!c) return "";
  try{const v=JSON.parse(c.value);if(v===null)return "";if(typeof v==="string")return v;if(v.text)return v.text;if(v.name)return v.name;return c.text||"";}catch(e){return c.text||"";}
}

function badgeCls(s) {
  if(!s) return "bg-gray";
  const l=s.toLowerCase();
  if(l.includes("active")) return "bg-red";
  if(l.includes("expir")||l.includes("remov")) return "bg-gray";
  if(l.includes("review")) return "bg-orange";
  return "bg-gray";
}

async function loadData() {
  let all=[],cursor=null;
  for(let p=0;p<20;p++) {
    let q;
    if(cursor) q=`{next_items_page(limit:100,cursor:"${cursor}"){cursor items{id name column_values{id text value}}}}`;
    else q=`{boards(ids:${DS_BOARD}){items_page(limit:100){cursor items{id name column_values{id text value}}}}}`;
    const data=await gql(q);
    const pd=cursor?data?.data?.next_items_page:data?.data?.boards?.[0]?.items_page;
    if(!pd||!pd.items||!pd.items.length) break;
    all=all.concat(pd.items.map(item=>{
      const r={id:item.id,name:item.name};
      Object.entries(DS_COLS).forEach(e=>{r[e[0]]=getVal(item.column_values,e[1]);});
      return r;
    }));
    if(!pd.cursor) break;
    cursor=pd.cursor;
  }
  dsItems=all.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  document.getElementById("live-badge").textContent="● Live — "+dsItems.length+" records";
  populateFilters();
  renderList();
}

function populateFilters() {
  const branches=[...new Set(dsItems.map(r=>r.branch).filter(Boolean))].sort();
  const statuses=[...new Set(dsItems.map(r=>r.status).filter(Boolean))].sort();
  const types=[...new Set(dsItems.map(r=>r.requestType).filter(Boolean))].sort();
  function addOpts(id,arr){const el=document.getElementById(id);arr.forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;el.appendChild(o);});}
  addOpts("f-branch",branches);addOpts("f-status",statuses);addOpts("f-type",types);
}

function clearFilters(){["f-branch","f-status","f-type","search"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});renderList();}

function subjectName(r){return [r.subjectFirstName,r.subjectLastName].filter(Boolean).join(" ")||r.name||"Unknown";}

function renderList() {
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fb=document.getElementById("f-branch").value;
  const fs=document.getElementById("f-status").value;
  const ft=document.getElementById("f-type").value;
  const filtered=dsItems.filter(r=>{
    const sn=subjectName(r);
    if(q&&![sn,r.branch,r.subjectId].some(s=>(s||"").toLowerCase().includes(q))) return false;
    if(fb&&r.branch!==fb) return false;
    if(fs&&r.status!==fs) return false;
    if(ft&&r.requestType!==ft) return false;
    return true;
  });
  const panel=document.getElementById("list-panel");
  if(!filtered.length){panel.innerHTML="<div class='empty'>No records match filters.</div>";return;}
  panel.innerHTML=filtered.map(r=>
    `<div class="list-item ${selectedId===r.id?"active":""}" onclick="selectItem('${r.id}')">
      <div class="item-name">${subjectName(r)}</div>
      <div class="item-caseid"><span class="badge ${badgeCls(r.status)}">${r.status||"—"}</span></div>
      <div class="item-meta">
        <span><span class="lbl">Branch </span>${r.branch||"—"}</span>
        <span><span class="lbl">Date </span>${r.date||"—"}</span>
        <span><span class="lbl">Type </span>${r.requestType||"—"}</span>
        <span><span class="lbl">ID </span>${r.subjectId||"—"}</span>
      </div>
    </div>`
  ).join("");
}

function selectItem(id) {
  selectedId=id;
  renderList();
  const r=dsItems.find(x=>x.id===id);
  if(r){renderDetail(r);updateStatusBar(r);}
}

function updateStatusBar(r) {
  document.getElementById("status-bar").style.display="flex";
  function setBtn(id,lbl,val,cls){const el=document.getElementById(id);if(el){el.textContent=lbl+": "+(val||"—");el.className="sbutton"+(cls?" "+cls:"");}}
  setBtn("sb-status","Status",r.status,r.status&&r.status.toLowerCase().includes("active")?"active-red":"");
  setBtn("sb-audit","Audit",r.audit,r.audit?"active-orange":"");
}

function renderDetail(r) {
  const sn=subjectName(r);
  document.getElementById("detail-panel").innerHTML=`
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-name">${sn}</div>
          <div class="card-sub">${r.branch||""} · ${r.date||""} · ${r.requestType||""}</div>
        </div>
        <div class="card-actions">
          <span class="badge ${badgeCls(r.status)}">${r.status||"—"}</span>
        </div>
      </div>
      <div class="sec"><div class="sec-title">Subject Information</div><div class="fgrid">
        <div class="f"><div class="flabel">First name</div><div class="fval">${r.subjectFirstName||"—"}</div></div>
        <div class="f"><div class="flabel">Last name</div><div class="fval">${r.subjectLastName||"—"}</div></div>
        <div class="f"><div class="flabel">Subject type</div><div class="fval">${r.subjectType||"—"}</div></div>
        <div class="f"><div class="flabel">Subject ID</div><div class="fval">${r.subjectId||"—"}</div></div>
        <div class="f"><div class="flabel">Phone</div><div class="fval">${r.phone||"—"}</div></div>
        <div class="f"><div class="flabel">NICS #</div><div class="fval">${r.nicsNumber||"—"}</div></div>
      </div></div>
      <div class="sec"><div class="sec-title">Record Details</div><div class="fgrid">
        <div class="f"><div class="flabel">Branch</div><div class="fval">${r.branch||"—"}</div></div>
        <div class="f"><div class="flabel">District</div><div class="fval">${r.district||"—"}</div></div>
        <div class="f"><div class="flabel">Date</div><div class="fval">${r.date||"—"}</div></div>
        <div class="f"><div class="flabel">Last action date</div><div class="fval">${r.lastActionDate||"—"}</div></div>
        <div class="f"><div class="flabel">Request type</div><div class="fval">${r.requestType||"—"}</div></div>
        <div class="f"><div class="flabel">Submitted by</div><div class="fval">${r.submittedBy||"—"}</div></div>
        <div class="f"><div class="flabel">Audit</div><div class="fval">${r.audit||"—"}</div></div>
        <div class="f"><div class="flabel">Linked IR</div><div class="fval">${r.incidentReport||"—"}</div></div>
      </div></div>
      <div class="sec"><div class="sec-title">Narrative</div><div class="narr">${r.narrative||"—"}</div></div>
      ${r.apNarrative?`<div class="sec"><div class="sec-title">AP Narrative</div>
        <textarea id="edit-apnarr" style="width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-family:inherit;resize:vertical;background:#0f1923;color:#e0eaf5;">${r.apNarrative}</textarea>
        <div class="fedit-actions"><button class="btn-primary btn-small" onclick="saveApNarr('${r.id}')">Save to Monday</button><span id="msg-apnarr" class="save-msg"></span></div>
      </div>`:`<div class="sec"><div class="sec-title">AP Narrative</div>
        <textarea id="edit-apnarr" style="width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #2d3f55;border-radius:6px;font-family:inherit;resize:vertical;background:#0f1923;color:#e0eaf5;"></textarea>
        <div class="fedit-actions"><button class="btn-primary btn-small" onclick="saveApNarr('${r.id}')">Save to Monday</button><span id="msg-apnarr" class="save-msg"></span></div>
      </div>`}
      ${r.apNotes?`<div class="sec"><div class="sec-title">AP Notes</div><div class="narr">${r.apNotes}</div></div>`:""}
    </div>`;
}

async function saveApNarr(itemId) {
  const val=document.getElementById("edit-apnarr").value;
  const escaped=val.replace(/\\/g,"\\\\").replace(/"/g,'\\"').replace(/\n/g,"\\n");
  const mut=`mutation{change_simple_column_value(board_id:${DS_BOARD},item_id:${itemId},column_id:"text_mkpxnqe3",value:"${escaped}"){id}}`;
  const res=await gql(mut);
  const ok=!!res?.data?.change_simple_column_value?.id;
  const el=document.getElementById("msg-apnarr");
  if(el){el.textContent=ok?"Saved":"Failed";el.className="save-msg "+(ok?"ok":"err");setTimeout(()=>el.textContent="",3000);}
  if(ok){const item=dsItems.find(x=>x.id===itemId);if(item)item.apNarrative=val;}
}

function toggleDD(ddId,e) {
  e.stopPropagation();
  document.querySelectorAll(".status-dropdown-menu.open").forEach(el=>{if(el.id!==ddId)el.classList.remove("open");});
  const dd=document.getElementById(ddId);
  if(!dd.classList.contains("open")){dd.classList.add("open");populateDD(ddId);}
  else dd.classList.remove("open");
}
document.addEventListener("click",()=>document.querySelectorAll(".status-dropdown-menu.open").forEach(el=>el.classList.remove("open")));

async function populateDD(ddId) {
  if(!selectedId) return;
  const r=dsItems.find(x=>x.id===selectedId);
  if(!r) return;
  const dd=document.getElementById(ddId);
  dd.innerHTML="<div class='status-saving'>Loading...</div>";
  const MAP={
    "dd-status":{colId:"status",prop:"status"},
    "dd-audit":{colId:"color_mkq4smae",prop:"audit"}
  };
  const entry=MAP[ddId];
  if(!entry)return;
  const q=`{boards(ids:${DS_BOARD}){columns(ids:["${entry.colId}"]){settings_str}}}`;
  const data=await gql(q);
  let opts=[];
  try{const s=JSON.parse(data?.data?.boards?.[0]?.columns?.[0]?.settings_str||"{}");opts=(s.labels||[]).map(l=>l.name).filter(Boolean);}catch(e){}
  if(!opts.length){dd.innerHTML="<div class='status-saving'>No options</div>";return;}
  const current=r[entry.prop];
  dd.innerHTML=opts.map(opt=>{
    const isCurrent=opt===current;
    const l=opt.toLowerCase();
    const fg=l.includes("active")?"#e05050":l.includes("expir")||l.includes("remov")?"#8fa8c0":l.includes("review")?"#e0a030":"#c0d4e8";
    return `<div class="status-option${isCurrent?" current":""}" style="color:${fg};" onclick="selectStatus('${ddId}','${entry.colId}','${entry.prop}','${opt.replace(/'/g,"\\'")}')">${isCurrent?"✓ ":""}${opt}</div>`;
  }).join("");
}

async function selectStatus(ddId,colId,prop,value) {
  if(!selectedId) return;
  const r=dsItems.find(x=>x.id===selectedId);
  const dd=document.getElementById(ddId);
  dd.innerHTML="<div class='status-saving'>Saving...</div>";
  const colVal=JSON.stringify(JSON.stringify({label:value}));
  const mut=`mutation{change_column_value(board_id:${DS_BOARD},item_id:${selectedId},column_id:"${colId}",value:${colVal}){id}}`;
  const res=await gql(mut);
  const ok=!!res?.data?.change_column_value?.id;
  dd.classList.remove("open");
  if(ok){r[prop]=value;updateStatusBar(r);renderDetail(r);renderList();}
  else alert("Save failed — please try again.");
}

loadData();
</script>
</body>
</html>
