<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA - AP Case Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;}
.header{background:#2d3a4a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{font-size:11px;color:#4caf50;letter-spacing:1px;}
.ap-text{font-size:11px;color:#8fa8c0;letter-spacing:2px;text-transform:uppercase;}
.toolbar{display:flex;gap:6px;padding:10px 12px;align-items:center;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e0e0e0;}
input[type=text],select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#fff;color:#1a1a1a;}
input[type=date]{padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-size:12px;outline:none;font-family:inherit;}
button{padding:5px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:#333;}
button:hover{background:#f5f5f5;}
.btn-primary{background:#2d3a4a;color:#fff;border-color:#2d3a4a;}
.btn-small{font-size:11px;padding:3px 10px;}
.main{display:flex;height:calc(100vh - 108px);}
.list{width:310px;min-width:310px;overflow-y:auto;border-right:1px solid #e0e0e0;background:#fff;}
.list-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.list-item:hover{background:#f5f8ff;}
.list-item.active{background:#e8f0fb;border-left:3px solid #3a7bd5;}
.item-name{font-size:12px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-caseid{font-size:11px;color:#3a7bd5;font-weight:500;margin-bottom:5px;}
.item-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;}
.item-meta span{font-size:10px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta .lbl{color:#aaa;}
.detail{flex:1;overflow-y:auto;padding:14px;}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px 18px;max-width:1100px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:15px;font-weight:600;}
.card-caseid{font-size:11px;color:#999;margin-top:2px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.bg-green{background:#e6f4ec;color:#1a7a3f;}
.bg-orange{background:#fff8e6;color:#b07800;}
.bg-red{background:#fdecea;color:#c0392b;}
.bg-gray{background:#f0f0f0;color:#555;}
.bg-blue{background:#e6f0fb;color:#1a5fa8;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#2d3a4a;text-transform:uppercase;letter-spacing:.09em;padding-bottom:4px;border-bottom:2px solid #2d3a4a;margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px 16px;}
.f{margin-bottom:2px;}
.f.full{grid-column:1/-1;}
.f.half{grid-column:span 2;}
.flabel{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fval{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;}
.fedit textarea{width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;resize:vertical;line-height:1.6;}
.fedit input[type=text]{width:100%;font-size:12px;}
.fedit-actions{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.save-msg{font-size:11px;}
.save-msg.ok{color:#1a7a3f;}
.save-msg.err{color:#c0392b;}
.vr-card{background:#2d3a4a;border-radius:8px;padding:11px 13px;margin-bottom:8px;}
.vr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.vr-agency{font-size:13px;font-weight:600;color:#fff;}
.vr-sub{font-size:11px;color:#8fa8c0;margin-top:1px;}
.vr-right{display:flex;gap:5px;align-items:center;}
.vr-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;}
.vr-expand{font-size:11px;padding:3px 9px;background:transparent;border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:4px;cursor:pointer;}
.vr-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
.vrf-label{font-size:10px;color:#6a8aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.vrf-val{font-size:12px;color:#e8eef4;line-height:1.5;white-space:pre-wrap;}
.vrf.full{grid-column:1/-1;}
.ds-card{background:#fdecea;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #f5c6c6;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#fff;border-radius:12px;padding:18px 22px;max-width:640px;width:92%;max-height:82vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-title{font-size:14px;font-weight:600;}
.modal-sub{font-size:11px;color:#888;margin-top:1px;}
.mfields{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
.mf{margin-bottom:2px;}
.mf.full{grid-column:1/-1;}
.mf-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.mf-val{font-size:13px;line-height:1.7;white-space:pre-wrap;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#888;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#3a7bd5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#aaa;font-size:13px;}
.err-msg{padding:16px;color:#c0392b;font-size:13px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:#f8f8f8;border-bottom:1px solid #e8e8e8;}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:#fff;border-bottom:1px solid #e8e8e8;align-items:center;}
.status-bar-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-right:4px;}
.sbutton{font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1.5px solid #ccc;background:#fff;font-family:inherit;font-weight:500;transition:all .15s;}
.sbutton.active-green{background:#e6f4ec;color:#1a7a3f;border-color:#1a7a3f;}
.sbutton.active-red{background:#fdecea;color:#c0392b;border-color:#c0392b;}
.sbutton.active-blue{background:#e6f0fb;color:#1a5fa8;border-color:#1a5fa8;}
.sbutton.active-orange{background:#fff8e6;color:#b07800;border-color:#b07800;}
.settings-panel{background:#f9f9f9;border-bottom:1px solid #e0e0e0;padding:14px 18px;display:none;}
.settings-panel.open{display:block;}
.settings-tabs{display:flex;gap:4px;margin-bottom:12px;}
.stab{padding:5px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;}
.stab.active{background:#2d3a4a;color:#fff;border-color:#2d3a4a;}
.stab-content{display:none;}
.stab-content.active{display:block;}
.settings-row{display:flex;flex-wrap:wrap;gap:8px;}
.settings-check{display:flex;align-items:center;gap:5px;font-size:12px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:4px 10px;cursor:pointer;}
.settings-check input{margin:0;}
.drag-list{display:flex;flex-direction:column;gap:6px;max-width:400px;}
.drag-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:7px 12px;cursor:grab;font-size:12px;user-select:none;}
.drag-item:active{cursor:grabbing;}
.drag-item.dragging{opacity:.4;border-style:dashed;}
.drag-item.drag-over{border-color:#3a7bd5;background:#e8f0fb;}
.drag-handle{color:#bbb;font-size:14px;cursor:grab;}
.drag-item input{margin:0;}
.status-dropdown{position:relative;display:inline-block;}
.status-dropdown-menu{position:absolute;top:100%;left:0;z-index:200;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:220px;padding:4px 0;margin-top:4px;display:none;}
.status-dropdown-menu.open{display:block;}
.status-option{padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;}
.status-option:hover{background:#f0f4ff;}
.status-option.current{font-weight:600;color:#2d3a4a;}
.status-saving{font-size:11px;color:#888;padding:7px 14px;}
</style>
</head>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search case ID, name, branch..." oninput="renderList()" style="flex:1;min-width:160px;"/>
  <button onclick="toggleSettings()" style="font-size:12px;">⚙ Settings</button>
</div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-tabs">
    <button class="stab active" onclick="switchTab('tab-sections')">Section Order</button>
    <button class="stab" onclick="switchTab('tab-fields')">Visible Fields</button>
  </div>
  <div id="tab-sections" class="stab-content active">
    <div style="font-size:11px;color:#888;margin-bottom:10px;">Drag to reorder sections. Uncheck to hide.</div>
    <div class="drag-list" id="section-drag-list"></div>
  </div>
  <div id="tab-fields" class="stab-content">
    <div style="font-size:11px;color:#888;margin-bottom:8px;">Toggle which fields appear in the case detail view</div>
    <div class="settings-row" id="field-toggles"></div>
  </div>
</div>
<div class="filter-row">
  <select id="f-branch" onchange="renderList()"><option value="">All branches</option></select>
  <select id="f-category" onchange="renderList()"><option value="">All categories</option></select>
  <select id="f-type" onchange="renderList()"><option value="">All types</option></select>
  <select id="f-ap" onchange="renderList()">
    <option value="">All AP actions</option>
    <option value="YES - AP ACTION NEEDED">AP Action Needed</option>
    <option value="AP Review Completed">AP Review Completed</option>
    <option value="No - AP Action is not needed">No AP Action Needed</option>
  </select>
  <select id="f-hr" onchange="renderList()">
    <option value="">All HR</option>
    <option value="Termination">Termination</option>
    <option value="Final Written">Final Written</option>
    <option value="Written Warning">Written Warning</option>
  </select>
  <select id="f-retain" onchange="renderList()">
    <option value="">All retain video</option>
    <option value="yes">Yes - Retain</option>
    <option value="no">No</option>
  </select>
  <select id="f-deny" onchange="renderList()">
    <option value="">All deny service</option>
    <option value="has">Has DNS record</option>
    <option value="none">No DNS record</option>
  </select>
  <input type="date" id="f-date-from" onchange="renderList()" title="Date from"/>
  <input type="date" id="f-date-to" onchange="renderList()" title="Date to"/>
  <button onclick="clearFilters()" class="btn-small">Clear filters</button>
</div>
<div id="status-bar" class="status-bar" style="display:none;">

  <div class="status-dropdown">
    <button class="sbutton" id="sb-video" onclick="toggleStatusDropdown('dd-video',event)">Video: —</button>
    <div class="status-dropdown-menu" id="dd-video"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-deny" onclick="toggleStatusDropdown('dd-deny',event)">Deny Service: —</button>
    <div class="status-dropdown-menu" id="dd-deny"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-hr" onclick="toggleStatusDropdown('dd-hr',event)">HR Review: —</button>
    <div class="status-dropdown-menu" id="dd-hr"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-hrrec" onclick="toggleStatusDropdown('dd-hrrec',event)">HR Rec: —</button>
    <div class="status-dropdown-menu" id="dd-hrrec"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-handshake" onclick="toggleStatusDropdown('dd-handshake',event)">Rich Handshake: —</button>
    <div class="status-dropdown-menu" id="dd-handshake"></div>
  </div>
  <div class="status-dropdown">
    <button class="sbutton" id="sb-ownership" onclick="toggleStatusDropdown('dd-ownership',event)">Ownership: —</button>
    <div class="status-dropdown-menu" id="dd-ownership"></div>
  </div>
</div>

  <div class="list" id="list-panel">

    <div class="empty">Select a case from the list</div>
  </div>
</div>

async function gql(query) {
  const r = await fetch(PROXY + encodeURIComponent("https://api.monday.com/v2"), {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":TOKEN},
    body:JSON.stringify({query})
  });
  return r.json();
}

function getVal(cols, id) {
  const c = cols.find(x => x.id === id);
  if (!c) return "";
  try {
    const v = JSON.parse(c.value);
    if (v === null) return "";
    if (typeof v === "string") return v;
    if (v.text) return v.text;
    if (v.name) return v.name;
    if (Array.isArray(v)) return v.map(x => x.name||x).join(", ");
    return c.text || "";
  } catch(e) { return c.text || ""; }
}

async function fetchBoard(boardId, colMap, dateFilter) {
  let all=[], cursor=null;
  for (let p=0; p<30; p++) {
    let q;
    if (cursor) {
      q = "{next_items_page(limit:100,cursor:\"" + cursor + "\"){cursor items{id name column_values{id text value}}}}";
    } else if (dateFilter) {
      q = "{boards(ids:" + boardId + "){items_page(limit:100,query_params:{rules:[{column_id:\"date4\",compare_value:[\"" + dateFilter + "\"],operator:greater_than_or_equals}]}){cursor items{id name column_values{id text value}}}}}";
    } else {
      q = "{boards(ids:" + boardId + "){items_page(limit:100){cursor items{id name column_values{id text value}}}}}";
    }
    const data = await gql(q);
    const pd = cursor ? data?.data?.next_items_page : data?.data?.boards?.[0]?.items_page;
    if (!pd||!pd.items||!pd.items.length) break;
    all = all.concat(pd.items.map(item => {
      const r={id:item.id, name:item.name};
      Object.entries(colMap).forEach(function(e){ r[e[0]]=getVal(item.column_values,e[1]); });
      return r;
    }));
    if (!pd.cursor) break;
    cursor = pd.cursor;
  }
  return all;
}

function cleanNarrative(parts) {
  return parts
    .filter(Boolean)
    .map(p => p.replace(/^\*?\s*cont\.?\s*\*?\s*/gi,"").replace(/\(cont in narrative \d+.*?\)/gi,"").trim())
    .filter(Boolean)
    .join("\n\n");
}

function getIncidentTypes(r) {
  return [r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4].filter(Boolean).join(", ") || "—";
}

function getIRValue(r, key) {
  if (key==="narrative") return cleanNarrative([r.narrative1,r.narrative2,r.narrative3,r.narrative4]) || "—";
  if (key==="hrRec") {
    const rec = r.hrRecommendation && r.hrRecommendation!=="—" ? "Recommendation: "+r.hrRecommendation : "";
    const find = r.hrFindings && r.hrFindings!=="—" ? "Findings: "+r.hrFindings : "";
    return [rec,find].filter(Boolean).join("\n\n") || "—";
  }
  if (key==="interviewNarrative") return cleanNarrative([r.interviewNarrative1,r.interviewNarrative2]) || "—";
  return r[key]||"—";
}

function getLinkedVR(ir) {
  return vrItems.filter(function(vr) {
    if (vr.linkedIRId && String(vr.linkedIRId).trim() === String(ir.id).trim()) return true;
    if (vr.linkedCaseId && ir.caseId && String(vr.linkedCaseId).trim().toLowerCase() === String(ir.caseId).trim().toLowerCase()) return true;
    return false;
  });
}

function getLinkedDS(ir) {
  return dsItems.filter(function(ds) {
    return (ds.incidentReport && ds.incidentReport === ir.id) ||

function badgeCls(s) {
  if (!s) return "bg-gray";
  const l=s.toLowerCase();
  if (l.includes("completed")) return "bg-green";
  if (l.includes("progress")) return "bg-orange";
  if (l.includes("action needed")||l.includes("termination")) return "bg-red";
  return "bg-gray";
}

  const fdeny=document.getElementById("f-deny").value;
  const fdfrom=document.getElementById("f-date-from").value;
  const fdto=document.getElementById("f-date-to").value;
  const filtered = irItems.filter(function(r) {
    if ((r.category||"").toLowerCase()==="background check denial") return false;
    if (q && ![(r.caseId||""),(r.branch||""),(r.subjectName||""),displayName(r)].some(function(s){return s.toLowerCase().includes(q);})) return false;
    if (fb && r.branch!==fb) return false;
    if (fc && r.category!==fc) return false;
    if (ft && [r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4].indexOf(ft)<0) return false;
    if (fap && r.apFollowUp!==fap) return false;
    if (fhr && r.hrRec!==fhr) return false;

    if (fret==="no" && (r.retainVideo||"").toLowerCase().includes("yes")) return false;
    if (fdeny==="has" && !getLinkedDS(r).length) return false;
    if (fdeny==="none" && getLinkedDS(r).length) return false;
    if (fdfrom && r.date && r.date < fdfrom) return false;
    if (fdto && r.date && r.date > fdto) return false;
    return true;
  });
  const panel = document.getElementById("list-panel");

async function updateColumn(itemId, boardId, columnId, value, type) {
  let mut;
  if (type==="longtext") {
    // Use change_simple_column_value for long text — properly overwrites existing content
    const escaped = value.replace(/\\/g,"\\\\").replace(/"/g,"\\\"").replace(/\n/g,"\\n");
    mut = "mutation{change_simple_column_value(board_id:"+boardId+",item_id:"+itemId+",column_id:\""+columnId+"\",value:\""+escaped+"\"){id}}";
  } else {
    let colValue;
    if (type==="text") colValue=JSON.stringify(value);
    else if (type==="status") colValue=JSON.stringify({label:value});
    mut = "mutation{change_column_value(board_id:"+boardId+",item_id:"+itemId+",column_id:\""+columnId+"\",value:"+JSON.stringify(colValue)+"){id}}";
  }
  try { const res=await gql(mut); return !!(res&&res.data&&(res.data.change_column_value||res.data.change_simple_column_value)); }
  catch(e) { return false; }
}

// Settings panel
const FIELD_DEFS = [
  {id:"apFindings",label:"AP Findings"},
  {id:"hrRec",label:"HR Rec & Findings"},
  {id:"interviewNarrative",label:"Interview Narrative"},
  {id:"narrative",label:"Original Narrative"},
  {id:"subject",label:"Subject Info"},
  {id:"overview",label:"Overview"},
  {id:"details",label:"Details"},
  {id:"documents",label:"Documents & Media"},
  {id:"denialRecords",label:"Deny Service Records"},
  {id:"videoRequests",label:"Video Requests"}
];
const SECTION_DEFS = [
  {id:"sec-findings",label:"Findings"},
  {id:"sec-overview",label:"Overview"},
  {id:"sec-details",label:"Details"},
  {id:"sec-narrative",label:"Original Narrative"},
  {id:"sec-subject",label:"Subject"},
  {id:"sec-documents",label:"Documents & Media"},
  {id:"sec-dns",label:"Deny Service Records"},
  {id:"sec-vr",label:"Video Requests"}
];
const DEFAULT_SECTION_ORDER = SECTION_DEFS.map(function(s){return s.id;});
let sectionOrder = JSON.parse(localStorage.getItem("sectionOrder")||JSON.stringify(DEFAULT_SECTION_ORDER));
// Make sure any new sections not in saved order get appended
SECTION_DEFS.forEach(function(s){ if(sectionOrder.indexOf(s.id)<0) sectionOrder.push(s.id); });
let hiddenFields = JSON.parse(localStorage.getItem("hiddenFields")||"[]");
let hiddenSections = JSON.parse(localStorage.getItem("hiddenSections")||"[]");

// ── Settings panel ──────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById("settings-panel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) buildSettingsUI();
}

function switchTab(tabId) {
  document.querySelectorAll(".stab-content").forEach(function(el){el.classList.remove("active");});
  document.querySelectorAll(".stab").forEach(function(el){el.classList.remove("active");});
  document.getElementById(tabId).classList.add("active");
  event.target.classList.add("active");
}

function buildSettingsUI() {
  // Field toggles
  const ft = document.getElementById("field-toggles");
  ft.innerHTML = FIELD_DEFS.map(function(f){
    const checked = hiddenFields.indexOf(f.id)<0;
    return "<label class='settings-check'><input type='checkbox' "+(checked?"checked":"")+" onchange=\"toggleField('"+f.id+"',this.checked)\"/> "+f.label+"</label>";
  }).join("");
  // Section drag list
  buildSectionDragList();
}

function buildSectionDragList() {
  const list = document.getElementById("section-drag-list");
  list.innerHTML = sectionOrder.map(function(sid){
    const def = SECTION_DEFS.find(function(s){return s.id===sid;});
    if (!def) return "";
    const visible = hiddenSections.indexOf(sid)<0;
    return "<div class='drag-item' draggable='true' data-id='"+sid+"' ondragstart='dragStart(event)' ondragover='dragOver(event)' ondrop='dropSection(event)' ondragleave='dragLeave(event)'>"+
      "<span class='drag-handle'>⠿</span>"+
      "<input type='checkbox' "+(visible?"checked":"")+" onchange=\"toggleSection('"+sid+"',this.checked)\"/>"+
      "<span>"+def.label+"</span>"+
    "</div>";
  }).join("");
}

let dragSrcId = null;
function dragStart(e) {
  dragSrcId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}
function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  e.currentTarget.classList.add("drag-over");
}
function dragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function dropSection(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const targetId = e.currentTarget.dataset.id;
  if (!dragSrcId || dragSrcId === targetId) return;
  const srcIdx = sectionOrder.indexOf(dragSrcId);
  const tgtIdx = sectionOrder.indexOf(targetId);
  sectionOrder.splice(srcIdx, 1);
  sectionOrder.splice(tgtIdx, 0, dragSrcId);
  dragSrcId = null;
  localStorage.setItem("sectionOrder", JSON.stringify(sectionOrder));
  buildSectionDragList();
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function toggleField(id, visible) {
  if (visible) hiddenFields = hiddenFields.filter(function(x){return x!==id;});
  else if (hiddenFields.indexOf(id)<0) hiddenFields.push(id);
  localStorage.setItem("hiddenFields", JSON.stringify(hiddenFields));
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function toggleSection(id, visible) {
  if (visible) hiddenSections = hiddenSections.filter(function(x){return x!==id;});
  else if (hiddenSections.indexOf(id)<0) hiddenSections.push(id);
  localStorage.setItem("hiddenSections", JSON.stringify(hiddenSections));
  if (selectedId) { const r=irItems.find(function(x){return x.id===selectedId;}); if(r) renderDetail(r); }
}

function isSectionVisible(id) { return hiddenSections.indexOf(id)<0; }

// ── Status bar with live dropdowns ───────────────────────────
let columnOptionsCache = {};

async function fetchColumnOptions(colId) {
  if (columnOptionsCache[colId]) return columnOptionsCache[colId];
  try {
    const q = "{boards(ids:"+IR_BOARD+"){columns(ids:[\""+colId+"\"]){settings_str}}}";
    const data = await gql(q);
    const settings = JSON.parse(data?.data?.boards?.[0]?.columns?.[0]?.settings_str||"{}");
    const labels = settings.labels || {};
    const options = Object.values(labels).filter(Boolean);
    columnOptionsCache[colId] = options;
    return options;
  } catch(e) { return []; }
}

function updateStatusBar(r) {
  const bar = document.getElementById("status-bar");
  if (!r) { bar.style.display="none"; return; }
  bar.style.display="flex";

  function setBtn(id, label, val, activeClass) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.textContent = label+": "+(val&&val!=="—"?val:"—");
    btn.className = "sbutton"+(val&&val!=="—"?" "+(activeClass||"active-blue"):"");
  }

  setBtn("sb-ap",       "AP Follow-up",   r.apFollowUp,        r.apFollowUp&&r.apFollowUp.includes("Completed")?"active-green":"active-red");
  setBtn("sb-category", "Category",       r.category,          "active-gray");
  setBtn("sb-video",    "Video",          r.retainVideo,       (r.retainVideo||"").includes("Yes")?"active-blue":"");
  setBtn("sb-deny",     "Deny Service",   r.denyService,       "active-red");
  setBtn("sb-hr",       "HR Review",      r.hrRec,             "active-red");
  setBtn("sb-hrrec",    "HR Rec",         r.hrRecommendation,  "active-orange");
  setBtn("sb-handshake","Rich Handshake", r.richHandshake,     "active-green");
  setBtn("sb-ownership","Ownership",      r.currentOwnership,  "active-blue");
}

function toggleStatusDropdown(ddId, e) {
  e.stopPropagation();
  const dd = document.getElementById(ddId);
  const isOpen = dd.classList.contains("open");
  // Close all dropdowns first
  document.querySelectorAll(".status-dropdown-menu").forEach(function(el){el.classList.remove("open");});
  if (!isOpen) {
    dd.classList.add("open");
    populateDropdown(ddId);
  }
}

document.addEventListener("click", function(){
  document.querySelectorAll(".status-dropdown-menu").forEach(function(el){el.classList.remove("open");});
});

async function populateDropdown(ddId) {
  if (!selectedId) return;
  const r = irItems.find(function(x){return x.id===selectedId;});
  if (!r) return;
  const dd = document.getElementById(ddId);
  dd.innerHTML = "<div class='status-saving'>Loading options...</div>";

  const MAP = {
    "dd-ap":        {colId:"dup__of_hr_decision____1", prop:"apFollowUp"},
    "dd-category":  {colId:"color_mknf4hd3",           prop:"category"},
    "dd-video":     {colId:"deny_service__",            prop:"retainVideo"},
    "dd-deny":      {colId:"district_leader",           prop:"denyService"},
    "dd-hr":        {colId:"status_1__1",               prop:"hrRec"},
    "dd-hrrec":     {colId:"color_mm0fehr4",            prop:"hrRecommendation"},
    "dd-handshake": {colId:"color_mm0rs4kc",            prop:"richHandshake"},
    "dd-ownership": {colId:"color_mm0q8n2x",            prop:"currentOwnership"}
  };

  const entry = MAP[ddId];
  if (!entry) { dd.innerHTML = "<div class='status-saving'>Not configurable here</div>"; return; }

  const options = await fetchColumnOptions(entry.colId);
  if (!options.length) { dd.innerHTML = "<div class='status-saving'>No options found</div>"; return; }

  const current = r[entry.prop];
  dd.innerHTML = options.map(function(opt){
    const isCurrent = opt === current;
    return "<div class='status-option"+(isCurrent?" current":"")+"' onclick='selectStatus(\""+ddId+"\",\""+entry.colId+"\",\""+entry.prop+"\",\""+opt.replace(/"/g,"&quot;")+"\")'>"+
      (isCurrent?"✓ ":"")+opt+
    "</div>";
  }).join("");
}

async function saveHrFindings(itemId) {
  const raw = document.getElementById("edit-hrFindings").value;
  const val = raw.replace(/\n\s*\n/g, "\n.\n");
  const ok = await updateColumn(itemId, IR_BOARD, "long_text_mm0f4cbg", val, "longtext");
  showMsg("msg-hrFindings", ok);
  if (ok) { const item=irItems.find(function(x){return x.id===itemId;}); if(item) item.hrFindings=val; }
}

async function saveInterviewNarrative(itemId) {
  const raw = document.getElementById("edit-interviewNarrative").value;
  // Insert "." between paragraphs (replace blank lines with a line containing just ".")
  const val = raw.replace(/\n\s*\n/g, "\n.\n");
  const LIMIT = 2000;
  let part1 = val, part2 = "";
  if (val.length > LIMIT) {
    let splitAt = val.lastIndexOf("\n.\n", LIMIT);
    if (splitAt < 500) splitAt = val.lastIndexOf("\n", LIMIT);
    if (splitAt < 0) splitAt = LIMIT;
    part1 = val.substring(0, splitAt).trim();
    part2 = val.substring(splitAt).trim();
    if (!part1.endsWith(".")) part1 = part1 + "\n.";
  }
  const ok1 = await updateColumn(itemId, IR_BOARD, "long_text__1", part1, "longtext");
  let ok2 = true;
  if (part2) {
    ok2 = await updateColumn(itemId, IR_BOARD, "long_text3__1", part2, "longtext");
  } else {
    ok2 = await updateColumn(itemId, IR_BOARD, "long_text3__1", "", "longtext");
  }
  const ok = ok1 && ok2;
  showMsg("msg-interviewNarrative", ok);
  if (ok) {
    const item = irItems.find(function(x){return x.id===itemId;});
    if (item) { item.interviewNarrative1=part1; item.interviewNarrative2=part2; }
  }
}

async function selectStatus(ddId, colId, prop, value) {
  if (!selectedId) return;
  const r = irItems.find(function(x){return x.id===selectedId;});
  if (!r) return;
  const dd = document.getElementById(ddId);
  dd.innerHTML = "<div class='status-saving'>Saving...</div>";
  const ok = await updateColumn(selectedId, IR_BOARD, colId, value, "status");
  dd.classList.remove("open");
  if (ok) {
    r[prop] = value;
    updateStatusBar(r);
    renderList();
    if (selectedId) renderDetail(r);
  } else {
    alert("Save failed — please try again.");
  }
}

async function init() {
  try {
    const sixMonthsAgo = new Date();
    sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
    const dateFilter = sixMonthsAgo.toISOString().split("T")[0];
    const results = await Promise.all([
      fetchBoard(IR_BOARD, IR_COLS, dateFilter),
      fetchBoard(VR_BOARD, VR_COLS, dateFilter),
      fetchBoard(DS_BOARD, DS_COLS, dateFilter)
    ]);
    irItems=results[0]; vrItems=results[1]; dsItems=results[2];
    document.getElementById("live-badge").textContent="Live - "+irItems.length+" cases";
    populateFilters();
    renderList();
  } catch(e) {
    document.getElementById("list-panel").innerHTML="<div class=\"err-msg\">Error: "+e.message+"</div>";
    document.getElementById("live-badge").textContent="Error";
  }
}

init();
