<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA — AP Case Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;}
.header{background:#2d3a4a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:4px;}
.logo-text{font-size:17px;font-weight:800;color:#fff;letter-spacing:3px;font-family:Georgia,serif;}
.logo svg{margin:0 4px;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{font-size:11px;color:#4caf50;letter-spacing:1px;}
.ap-text{font-size:11px;color:#8fa8c0;letter-spacing:2px;text-transform:uppercase;}
.toolbar{display:flex;gap:8px;padding:14px 16px;align-items:center;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e0e0e0;}
input[type=text],select{padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;outline:none;font-family:inherit;}
input[type=text]{flex:1;min-width:200px;}
input[type=text]:focus,select:focus{border-color:#3a7bd5;}
button{padding:6px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:#333;}
button:hover{background:#f5f5f5;}
.main{display:flex;height:calc(100vh - 100px);}
.list{width:300px;min-width:300px;overflow-y:auto;border-right:1px solid #e0e0e0;background:#fff;}
.list-item{padding:12px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background 0.15s;}
.list-item:hover{background:#f5f8ff;}
.list-item.active{background:#e8f0fb;border-left:3px solid #3a7bd5;}
.list-item-name{font-size:13px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item-caseid{font-size:11px;color:#3a7bd5;font-weight:500;margin-bottom:6px;}
.list-item-meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;}
.list-item-meta span{font-size:11px;color:#666;}
.list-item-meta .label{color:#aaa;}
.detail{flex:1;overflow-y:auto;padding:16px;}
.detail-card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:18px 20px;max-width:1000px;}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.detail-name{font-size:16px;font-weight:600;}
.detail-caseid{font-size:11px;color:#999;margin-top:2px;}
.detail-actions{display:flex;gap:6px;}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;display:inline-block;}
.badge-green{background:#e6f4ec;color:#1a7a3f;}
.badge-orange{background:#fff8e6;color:#b07800;}
.badge-red{background:#fdecea;color:#c0392b;}
.badge-gray{background:#f0f0f0;color:#444;}
.section{margin-bottom:18px;}
.section-title{font-size:10px;font-weight:700;color:#2d3a4a;text-transform:uppercase;letter-spacing:0.09em;padding-bottom:5px;border-bottom:2px solid #2d3a4a;margin-bottom:10px;}
.field-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px 18px;}
.field{margin-bottom:4px;}
.field.full{grid-column:1/-1;}
.field-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}
.field-value{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;}
.vr-card{background:#2d3a4a;border-radius:8px;padding:12px 14px;margin-bottom:10px;color:#fff;}
.vr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.vr-agency{font-size:13px;font-weight:600;color:#fff;}
.vr-sub{font-size:11px;color:#8fa8c0;margin-top:2px;}
.vr-actions{display:flex;gap:6px;align-items:center;}
.vr-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.15);color:#fff;}
.vr-expand{font-size:11px;padding:3px 10px;background:transparent;border:1px solid #c0392b;color:#fff;border-radius:4px;cursor:pointer;}
.vr-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.vr-field-label{font-size:10px;color:#6a8aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.vr-field-value{font-size:12px;color:#e8eef4;line-height:1.6;white-space:pre-wrap;}
.vr-field.full{grid-column:1/-1;}
.doc-thumbs{display:flex;flex-wrap:wrap;gap:10px;padding-top:6px;}
.doc-thumb{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;}
.doc-thumb-icon{width:60px;height:60px;border-radius:8px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:24px;}
.doc-thumb-label{font-size:10px;color:#666;max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#fff;border-radius:12px;padding:20px 24px;max-width:640px;width:92%;max-height:82vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.modal-title{font-size:14px;font-weight:600;}
.modal-sub{font-size:11px;color:#888;margin-top:2px;}
.modal-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
.modal-field{margin-bottom:2px;}
.modal-field.full{grid-column:1/-1;}
.modal-field-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.modal-field-value{font-size:13px;line-height:1.7;white-space:pre-wrap;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#888;gap:12px;}
.loading-spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#3a7bd5;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#aaa;font-size:13px;}
.error{padding:20px;color:#c0392b;font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-text">RANGE</span>
    <svg width="26" height="26" viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="12" fill="none" stroke="#c0392b" stroke-width="2.5"/>
      <line x1="16" y1="4" x2="16" y2="28" stroke="#c0392b" stroke-width="2.5"/>
      <line x1="4" y1="16" x2="28" y2="16" stroke="#c0392b" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="2.5" fill="#c0392b"/>
    </svg>
    <span class="logo-text">USA</span>
  </div>
  <div class="header-right">
    <span class="live-badge" id="live-badge">● Loading…</span>
    <span class="ap-text">Asset Protection</span>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search case ID, subject, branch…" oninput="renderList()"/>
  <select id="status-filter" onchange="renderList()">
    <option value="all">All statuses</option>
    <option value="completed">Completed</option>
    <option value="in progress">In Progress</option>
    <option value="action needed">Action needed</option>
  </select>
</div>

<div class="main">
  <div class="list" id="list-panel">
    <div class="loading"><div class="loading-spinner"></div><span>Loading cases…</span></div>
  </div>
  <div class="detail" id="detail-panel">
    <div class="empty">Select a case from the list</div>
  </div>
</div>

<div class="modal-overlay" id="vr-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="vr-modal-content"></div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY0MzAzMzE5NiwiYWFpIjoxMSwidWlkIjo1OTA4NDY1LCJpYWQiOiIyMDI2LTA0LTA4VDEzOjM2OjQ2LjA4MloiLCJwZXIiOiJtZTp3cml0ZSIsImFjdGlkIjoyNjYzMjIyLCJyZ24iOiJ1c2UxIn0.y2EeoxRh9al0cSui5AnYbRKOVDz2vdYII90esef1tuI";
const IR_BOARD = "309348813";
const VR_BOARD = "992178387";
const PROXY = "https://corsproxy.io/?";

let irItems = [], vrItems = [], selectedId = null, currentVR = null;

const IR_COLS = {
  caseId:"formula_mkr4w8ec",date:"date4",incidentTime:"hour",branch:"location",
  district:"person",submittedBy:"text0",submittedByEmail:"email",location:"dropdown",
  specificLocation:"text",category:"status_1",incidentType:"dropdown0",apFollowUp:"status",
  denyService:"status_13",retainVideo:"status_17",hrRec:"status_18",
  hrFindings:"long_text_mkr0zd6h",narrative1:"long_text",narrative2:"long_text_1",
  narrative3:"long_text_2",narrative4:"long_text_3",apFindings:"long_text_4",
  interviewNarrative:"long_text_5",subjectName:"text_mkr13ght",subjectType:"dropdown_mkr1b30k",
  injuries:"status_14",propertyDamage:"status_110",policeReport:"text_mkr2",
  oneDriveLink:"link",documents:"file",pictures:"file0"
};

const VR_COLS = {
  agency:"status_14",status:"status",assigned:"person",priority:"status_15",
  branch:"location",incidentDate:"date4",submittedBy:"text0",
  requestNarrative:"long_text",supplement:"long_text_1",oneDriveLink:"link",
  leContact:"text_1",leEmail:"email",lePhone:"phone",reviewDecision:"status_16",
  dateCompleted:"date0",caseIdLinked:"board_relation"
};

async function gql(query) {
  const url = PROXY + encodeURIComponent("https://api.monday.com/v2");
  const r = await fetch(url, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":TOKEN},
    body:JSON.stringify({query})
  });
  return r.json();
}

function getVal(cols, id) {
  const c = cols.find(x => x.id === id);
  if (!c) return "";
  try {
    const v = JSON.parse(c.value);
    if (v === null) return "";
    if (typeof v === "string") return v;
    if (v.text) return v.text;
    if (v.name) return v.name;
    if (Array.isArray(v)) return v.map(x => x.name || x).join(", ");
    return c.text || "";
  } catch { return c.text || ""; }
}

async function fetchBoard(boardId, colMap) {
  let all = [], cursor = null;
  for (let p = 0; p < 20; p++) {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - 6);
    const cutoffStr = cutoff.toISOString().split("T")[0];
    const rules = `rules:[{column_id:"date4",compare_value:["${cutoffStr}"],operator:greater_than_or_equals}]`;
    const q = cursor
      ? `{next_items_page(limit:100,cursor:"${cursor}"){cursor items{id name column_values{id text value}}}}`
      : `{boards(ids:${boardId}){items_page(limit:100,query_params:{${rules}}){cursor items{id name column_values{id text value}}}}}`;
    const data = await gql(q);
    const pd = cursor ? data?.data?.next_items_page : data?.data?.boards?.[0]?.items_page;
    if (!pd) break;
    const mapped = pd.items.map(item => {
      const r = {id:item.id, name:item.name};
      Object.entries(colMap).forEach(([k,cid]) => { r[k] = getVal(item.column_values, cid); });
      return r;
    });
    all = [...all, ...mapped];
    if (!pd.cursor) break;
    cursor = pd.cursor;
  }
  return all;
}

function getIRValue(r, key) {
  if (key === "narrative1") return [r.narrative1,r.narrative2,r.narrative3,r.narrative4].filter(Boolean).join("\n\n");
  if (key === "hrRec") {
    const rec = r.hrRec && r.hrRec !== "—" ? "Recommendation: " + r.hrRec : "";
    const find = r.hrFindings && r.hrFindings !== "—" ? "Findings: " + r.hrFindings : "";
    return [rec,find].filter(Boolean).join("\n\n") || "—";
  }
  return r[key] || "—";
}

function badgeClass(s) {
  if (!s) return "badge-gray";
  const l = s.toLowerCase();
  if (l.includes("completed")) return "badge-green";
  if (l.includes("progress")) return "badge-orange";
  if (l.includes("action needed")||l.includes("termination")) return "badge-red";
  return "badge-gray";
}

function displayName(r) {
  const parts = [r.branch, r.incidentType].filter(Boolean);
  return parts.length ? parts.join(" · ") : r.name;
}

function getLinkedVR(ir) {
  return vrItems.filter(vr =>
    (vr.caseIdLinked && vr.caseIdLinked.includes(ir.id)) ||
    (ir.caseId && vr.caseId === ir.caseId)
  );
}

function renderList() {
  const q = document.getElementById("search").value.toLowerCase();
  const sf = document.getElementById("status-filter").value;
  const filtered = irItems.filter(r => {
    const mQ = !q || (r.caseId||"").toLowerCase().includes(q) || (r.branch||"").toLowerCase().includes(q) || (r.subjectName||"").toLowerCase().includes(q) || displayName(r).toLowerCase().includes(q);
    const mS = sf === "all" || (r.apFollowUp||"").toLowerCase().includes(sf);
    const isBackground = (r.category||"").toLowerCase() === "background check denial";
    return mQ && mS && !isBackground;
  });

  const panel = document.getElementById("list-panel");
  if (!filtered.length) { panel.innerHTML = '<div class="empty">No cases match your search.</div>'; return; }

  panel.innerHTML = filtered.map(r => `
    <div class="list-item ${selectedId === r.id ? 'active' : ''}" onclick="selectItem('${r.id}')">
      <div class="list-item-name">${displayName(r)}</div>
      <div class="list-item-caseid">${r.caseId || r.id}</div>
      <div class="list-item-meta">
        <span><span class="label">Branch </span>${r.branch||"—"}</span>
        <span><span class="label">Date </span>${r.date||"—"}</span>
        <span><span class="label">Category </span>${r.category||"—"}</span>
        <span><span class="label">Type </span>${(r.incidentType||"—").substring(0,20)}</span>
        <span><span class="label">DL </span>${r.district||"—"}</span>
        <span><span class="label">Status </span>${r.apFollowUp||"—"}</span>
      </div>
    </div>
  `).join("");
}

function selectItem(id) {
  selectedId = id;
  const r = irItems.find(x => x.id === id);
  renderList();
  if (r) renderDetail(r);
}

function docThumb(url, label) {
  if (!url || url === "N/A" || url === "—") return "";
  const isPdf = /\.pdf/i.test(url), isImg = /\.(png|jpg|jpeg|gif|webp)/i.test(url);
  const icon = isPdf ? "📄" : isImg ? "🖼" : "📁";
  const bg = isPdf ? "#fdecea" : isImg ? "#e6f0fa" : "#f5f5f5";
  return `<a class="doc-thumb" href="${url}" target="_blank">
    <div class="doc-thumb-icon" style="background:${bg}">${icon}</div>
    <span class="doc-thumb-label">${label}</span>
  </a>`;
}

function renderDetail(r) {
  const vrs = getLinkedVR(r);
  const sections = [
    {title:"Overview", fields:[
      {key:"caseId",label:"Case ID"},{key:"date",label:"Incident date"},{key:"incidentTime",label:"Incident time"},
      {key:"branch",label:"Branch"},{key:"district",label:"District leader"},{key:"submittedBy",label:"Submitted by"},
      {key:"location",label:"Location"},{key:"specificLocation",label:"Specific location"}
    ]},
    {title:"Details", fields:[
      {key:"category",label:"Category"},{key:"incidentType",label:"Incident type"},{key:"apFollowUp",label:"AP follow-up"},
      {key:"denyService",label:"Deny service"},{key:"retainVideo",label:"Retain video"}
    ]},
    {title:"Narrative", fields:[{key:"narrative1",label:"Original narrative",long:true}]},
    {title:"Findings", fields:[
      {key:"apFindings",label:"AP findings",long:true},
      {key:"hrRec",label:"HR recommendation & findings",long:true},
      {key:"interviewNarrative",label:"Interview narrative",long:true}
    ]},
    {title:"Subject", fields:[
      {key:"subjectName",label:"Subject name"},{key:"subjectType",label:"Subject type"},
      {key:"injuries",label:"Injuries"},{key:"propertyDamage",label:"Property damage"},
      {key:"policeReport",label:"Police report #"}
    ]}
  ];

  const sectionsHTML = sections.map(s => {
    const fieldsHTML = s.fields.map(f => `
      <div class="field ${f.long?'full':''}">
        <div class="field-label">${f.label}</div>
        <div class="field-value">${getIRValue(r, f.key)}</div>
      </div>
    `).join("");
    return `<div class="section"><div class="section-title">${s.title}</div><div class="field-grid">${fieldsHTML}</div></div>`;
  }).join("");

  const docsHTML = (r.oneDriveLink || r.documents || r.pictures) ? `
    <div class="section">
      <div class="section-title">Documents & media</div>
      <div class="doc-thumbs">
        ${docThumb(r.oneDriveLink,"Video")}
        ${docThumb(r.documents,"Document")}
        ${docThumb(r.pictures,"Picture")}
      </div>
    </div>` : "";

  const vrFields = [
    {key:"agency",label:"Agency"},{key:"status",label:"Status"},
    {key:"assigned",label:"Assigned to"},{key:"branch",label:"Branch"},
    {key:"incidentDate",label:"Incident date"},{key:"submittedBy",label:"Submitted by"},
    {key:"requestNarrative",label:"Request narrative",long:true},
    {key:"supplement",label:"SSC supplement",long:true}
  ];

  const vrsHTML = vrs.map((v,i) => `
    <div class="vr-card">
      <div class="vr-header">
        <div>
          <div class="vr-agency">${v.agency||"Video Request"}</div>
          <div class="vr-sub">${v.caseId||r.caseId||""} · ${v.branch||""}</div>
        </div>
        <div class="vr-actions">
          <span class="vr-status">${v.status||""}</span>
          <button class="vr-expand" onclick="openModal(${i}, '${r.id}')">Expand ↗</button>
        </div>
      </div>
      <div class="vr-fields">
        ${vrFields.map(f => `
          <div class="vr-field ${f.long?'full':''}">
            <div class="vr-field-label">${f.label}</div>
            <div class="vr-field-value">${v[f.key]||"—"}</div>
          </div>`).join("")}
      </div>
    </div>
  `).join("");

  document.getElementById("detail-panel").innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        <div>
          <div class="detail-name">${displayName(r)}</div>
          <div class="detail-caseid">${r.caseId||r.id}</div>
        </div>
        <div class="detail-actions">
          <button onclick="printCase('${r.id}')">🖨 Print</button>
        </div>
      </div>
      <div class="badges">
        ${r.apFollowUp?`<span class="badge ${badgeClass(r.apFollowUp)}">${r.apFollowUp}</span>`:""}
        ${r.category?`<span class="badge badge-gray">${r.category}</span>`:""}
        ${r.hrRec&&r.hrRec!=="—"?`<span class="badge badge-red">HR: ${r.hrRec}</span>`:""}
        ${(r.retainVideo||"").includes("Yes")?`<span class="badge badge-gray">Video retained</span>`:""}
      </div>
      ${sectionsHTML}
      ${docsHTML}
      <div class="section">
        <div class="section-title">Video requests (${vrs.length})</div>
        ${vrs.length ? vrsHTML : '<div style="font-size:13px;color:#999;padding:8px 0">No linked video requests.</div>'}
      </div>
    </div>
  `;
}

function openModal(vrIndex, irId) {
  const ir = irItems.find(x => x.id === irId);
  const vrs = getLinkedVR(ir);
  const v = vrs[vrIndex];
  currentVR = v;

  const allFields = [
    {key:"agency",label:"Agency"},{key:"status",label:"Status"},
    {key:"assigned",label:"Assigned to"},{key:"priority",label:"Priority"},
    {key:"branch",label:"Branch"},{key:"incidentDate",label:"Incident date"},
    {key:"submittedBy",label:"Submitted by"},
    {key:"requestNarrative",label:"Request narrative",long:true},
    {key:"supplement",label:"SSC supplement",long:true},
    {key:"leContact",label:"LE contact"},{key:"leEmail",label:"LE email"},
    {key:"lePhone",label:"LE phone"},{key:"reviewDecision",label:"Review decision"},
    {key:"dateCompleted",label:"Date completed"}
  ];

  document.getElementById("vr-modal-content").innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${v.agency||"Video Request"}</div>
        <div class="modal-sub">${v.caseId||""} · ${v.branch||""}</div>
      </div>
      <button onclick="document.getElementById('vr-modal').style.display='none'">✕ Close</button>
    </div>
    <div class="badges" style="margin-bottom:14px;">
      <span class="badge ${badgeClass(v.status)}">${v.status||""}</span>
    </div>
    <div class="modal-fields">
      ${allFields.map(f => `
        <div class="modal-field ${f.long?'full':''}">
          <div class="modal-field-label">${f.label}</div>
          <div class="modal-field-value">${v[f.key]||"—"}</div>
        </div>`).join("")}
    </div>
    ${v.oneDriveLink && v.oneDriveLink !== "—" ? `
      <div style="margin-top:14px;">
        <div class="modal-field-label">Video link</div>
        ${docThumb(v.oneDriveLink,"Video")}
      </div>` : ""}
  `;
  document.getElementById("vr-modal").style.display = "flex";
}

function closeModal(e) {
  if (e.target.id === "vr-modal") document.getElementById("vr-modal").style.display = "none";
}

function printCase(id) {
  const r = irItems.find(x => x.id === id);
  const vrs = getLinkedVR(r);
  const win = window.open("","_blank");
  win.document.write(`<!DOCTYPE html><html><head><title>${r.caseId||r.name}</title>
  <style>body{font-family:Georgia,serif;margin:40px;color:#222;font-size:13px;}
  h1{font-size:18px;color:#2d3a4a;margin-bottom:4px;}
  h2{font-size:10px;color:#2d3a4a;border-bottom:1px solid #2d3a4a;padding-bottom:3px;margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 20px;margin-bottom:10px;}
  .f label{font-size:9px;color:#888;text-transform:uppercase;display:block;margin-bottom:2px;}
  .full{grid-column:1/-1;}.logo{font-size:20px;font-weight:800;color:#2d3a4a;letter-spacing:3px;}
  .sub{font-size:11px;color:#c0392b;letter-spacing:2px;margin-bottom:16px;}
  @media print{body{margin:20px;}}</style></head><body>
  <div class="logo">RANGE ✛ USA</div><div class="sub">ASSET PROTECTION</div>
  <h1>${displayName(r)}</h1>
  <p style="color:#888;font-size:11px;margin-bottom:12px;">${r.caseId||r.id}</p>
  <h2>Overview</h2><div class="grid">
  ${["caseId","date","incidentTime","branch","district","submittedBy","location","specificLocation"].map(k=>`<div class="f"><label>${k}</label><p>${getIRValue(r,k)}</p></div>`).join("")}
  </div>
  <h2>Narrative</h2><div class="grid"><div class="f full"><label>Original narrative</label><p>${getIRValue(r,"narrative1").replace(/\n/g,"<br/>")}</p></div></div>
  <h2>Findings</h2><div class="grid">
  ${["apFindings","hrRec","interviewNarrative"].map(k=>`<div class="f full"><label>${k}</label><p>${getIRValue(r,k).replace(/\n/g,"<br/>")}</p></div>`).join("")}
  </div>
  <h2>Subject</h2><div class="grid">
  ${["subjectName","subjectType","injuries","propertyDamage"].map(k=>`<div class="f"><label>${k}</label><p>${getIRValue(r,k)}</p></div>`).join("")}
  </div>
  ${vrs.length?`<h2>Video Requests</h2>${vrs.map(v=>`<div style="border:1px solid #ddd;padding:10px;border-radius:4px;margin-bottom:8px;"><div class="grid">${["agency","status","assigned","requestNarrative","supplement"].map(k=>`<div class="f ${["requestNarrative","supplement"].includes(k)?"full":""}"><label>${k}</label><p>${(v[k]||"—").replace(/\n/g,"<br/>")}</p></div>`).join("")}</div></div>`).join("")}`:""}
  <script>window.print();<\/script></body></html>`);
  win.document.close();
}

async function init() {
  try {
    const [ir, vr] = await Promise.all([
      fetchBoard(IR_BOARD, IR_COLS),
      fetchBoard(VR_BOARD, VR_COLS)
    ]);
    irItems = ir;
    vrItems = vr;
    document.getElementById("live-badge").textContent = `● Live — ${irItems.length} cases`;
    renderList();
  } catch(e) {
    document.getElementById("list-panel").innerHTML = `<div class="error">Error loading data: ${e.message}</div>`;
    document.getElementById("live-badge").textContent = "● Error";
  }
}

init();
</script>
</body>
</html>
