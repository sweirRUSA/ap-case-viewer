<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Range USA — AP Case Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:14px;}
.header{background:#2d3a4a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;}
.header-right{display:flex;align-items:center;gap:16px;}
.live-badge{font-size:11px;color:#4caf50;letter-spacing:1px;}
.ap-text{font-size:11px;color:#8fa8c0;letter-spacing:2px;text-transform:uppercase;}
.toolbar{display:flex;gap:6px;padding:10px 12px;align-items:center;flex-wrap:wrap;background:#fff;border-bottom:1px solid #e0e0e0;}
input[type=text],select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;outline:none;font-family:inherit;background:#fff;color:#1a1a1a;}
input[type=text]:focus,select:focus{border-color:#3a7bd5;}
input[type=date]{padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-size:12px;outline:none;font-family:inherit;}
button{padding:5px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:#333;}
button:hover{background:#f5f5f5;}
.btn-primary{background:#2d3a4a;color:#fff;border-color:#2d3a4a;}
.btn-primary:hover{background:#3a4d63;}
.btn-small{font-size:11px;padding:3px 10px;}
.main{display:flex;height:calc(100vh - 108px);}
.list{width:310px;min-width:310px;overflow-y:auto;border-right:1px solid #e0e0e0;background:#fff;}
.list-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.list-item:hover{background:#f5f8ff;}
.list-item.active{background:#e8f0fb;border-left:3px solid #3a7bd5;}
.item-name{font-size:12px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-caseid{font-size:11px;color:#3a7bd5;font-weight:500;margin-bottom:5px;}
.item-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;}
.item-meta span{font-size:10px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta .lbl{color:#aaa;}
.detail{flex:1;overflow-y:auto;padding:14px;}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px 18px;max-width:1100px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-name{font-size:15px;font-weight:600;}
.card-caseid{font-size:11px;color:#999;margin-top:2px;}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.bg-green{background:#e6f4ec;color:#1a7a3f;}
.bg-orange{background:#fff8e6;color:#b07800;}
.bg-red{background:#fdecea;color:#c0392b;}
.bg-gray{background:#f0f0f0;color:#555;}
.bg-blue{background:#e6f0fb;color:#1a5fa8;}
.sec{margin-bottom:16px;}
.sec-title{font-size:10px;font-weight:700;color:#2d3a4a;text-transform:uppercase;letter-spacing:.09em;padding-bottom:4px;border-bottom:2px solid #2d3a4a;margin-bottom:8px;}
.fgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px 16px;}
.f{margin-bottom:2px;}
.f.full{grid-column:1/-1;}
.f.half{grid-column:span 2;}
.flabel{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.fval{font-size:13px;line-height:1.7;word-break:break-word;white-space:pre-wrap;}
.fedit textarea{width:100%;min-height:80px;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-family:inherit;resize:vertical;line-height:1.6;}
.fedit input[type=text]{width:100%;font-size:12px;}
.fedit-actions{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.save-msg{font-size:11px;}
.save-msg.ok{color:#1a7a3f;}
.save-msg.err{color:#c0392b;}
.vr-card{background:#2d3a4a;border-radius:8px;padding:11px 13px;margin-bottom:8px;}
.vr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.vr-agency{font-size:13px;font-weight:600;color:#fff;}
.vr-sub{font-size:11px;color:#8fa8c0;margin-top:1px;}
.vr-right{display:flex;gap:5px;align-items:center;}
.vr-status{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;}
.vr-expand{font-size:11px;padding:3px 9px;background:transparent;border:1px solid #c0392b;color:#fff;border-radius:4px;cursor:pointer;}
.vr-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;}
.vrf-label{font-size:10px;color:#6a8aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.vrf-val{font-size:12px;color:#e8eef4;line-height:1.5;white-space:pre-wrap;}
.vrf.full{grid-column:1/-1;}
.ds-card{background:#fdecea;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #f5c6c6;}
.ds-name{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:#fff;border-radius:12px;padding:18px 22px;max-width:640px;width:92%;max-height:82vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-title{font-size:14px;font-weight:600;}
.modal-sub{font-size:11px;color:#888;margin-top:1px;}
.mfields{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;}
.mf{margin-bottom:2px;}
.mf.full{grid-column:1/-1;}
.mf-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;}
.mf-val{font-size:13px;line-height:1.7;white-space:pre-wrap;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#888;gap:10px;}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#3a7bd5;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:40px;text-align:center;color:#aaa;font-size:13px;}
.err-msg{padding:16px;color:#c0392b;font-size:13px;}
.doc-link{display:inline-flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;margin-right:8px;}
.doc-icon{width:52px;height:52px;border-radius:6px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:20px;}
.doc-lbl{font-size:10px;color:#666;max-width:52px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 12px;background:#f8f8f8;border-bottom:1px solid #e8e8e8;}
</style>
</head>

async function gql(query) {
  const r = await fetch(PROXY + encodeURIComponent("https://api.monday.com/v2"), {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":TOKEN},
    body:JSON.stringify({query})
  });
  return r.json();
}

function getVal(cols, id) {
  const c = cols.find(x => x.id === id);
  if (!c) return "";
  try {
    const v = JSON.parse(c.value);
    if (v === null) return "";
    if (typeof v === "string") return v;
    if (v.text) return v.text;
    if (v.name) return v.name;
    if (Array.isArray(v)) return v.map(x => x.name||x).join(", ");
    return c.text || "";
  } catch { return c.text || ""; }
}

async function fetchBoard(boardId, colMap) {
  let all=[], cursor=null;
  for (let p=0; p<30; p++) {
    const q = cursor
      ? `{next_items_page(limit:100,cursor:"${cursor}"){cursor items{id name column_values{id text value}}}}`
      : `{boards(ids:${boardId}){items_page(limit:100){cursor items{id name column_values{id text value}}}}}`;
    const data = await gql(q);
    const pd = cursor ? data?.data?.next_items_page : data?.data?.boards?.[0]?.items_page;
    if (!pd||!pd.items||!pd.items.length) break;
    all = [...all, ...pd.items.map(item => {
      const r={id:item.id, name:item.name};
      Object.entries(colMap).forEach(([k,cid])=>{ r[k]=getVal(item.column_values,cid); });
      return r;
    })];
    if (!pd.cursor) break;
    cursor = pd.cursor;
  }
  return all;
}

function cleanNarrative(parts) {
  return parts
    .filter(Boolean)
    .map(p => p.replace(/^\*?\s*cont\.?\s*\*?\s*/gi,'').replace(/\(cont in narrative \d+.*?\)/gi,'').trim())
    .filter(Boolean)
    .join("\n\n");
}

function getIncidentTypes(r) {
  return [r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4]
    .filter(Boolean).join(", ") || "—";
}

function getIRValue(r, key) {
  if (key==="narrative") return cleanNarrative([r.narrative1,r.narrative2,r.narrative3,r.narrative4]);
  if (key==="hrRec") {
    const rec = r.hrRec&&r.hrRec!=="—" ? "Recommendation: "+r.hrRec : "";
    const find = r.hrFindings&&r.hrFindings!=="—" ? "Findings: "+r.hrFindings : "";
    return [rec,find].filter(Boolean).join("\n\n")||"—";
  }
  if (key==="incidentType") return getIncidentTypes(r);
  return r[key]||"—";
}

function getLinkedVR(ir) {
  return vrItems.filter(vr => {
    if (vr.linkToIR && vr.linkToIR.includes(ir.id)) return true;
    if (ir.id && vr.linkToIR && vr.linkToIR.includes(ir.id)) return true;
    if (ir.caseId && vr.caseIdMirror && vr.caseIdMirror.includes(ir.caseId)) return true;
    return false;
  });
}

function getLinkedDS(ir) {
  return dsItems.filter(ds =>
    (ds.incidentReport && ds.incidentReport === ir.id) ||
    (ir.caseId && ds.incidentReport === ir.caseId)
  );
}

function badgeCls(s) {
  if (!s) return "bg-gray";
  const l=s.toLowerCase();
  if (l.includes("completed")) return "bg-green";
  if (l.includes("progress")) return "bg-orange";
  if (l.includes("action needed")||l.includes("termination")) return "bg-red";
  return "bg-gray";
}

function displayName(r) {
  const t = getIncidentTypes(r);
  const parts = [r.branch, t!=="—"?t:null].filter(Boolean);
  return parts.length ? parts.join(" · ") : r.name;
}

function docLink(url, label) {
  if (!url||url==="N/A"||url==="—") return "";
  const isPdf=/\.pdf/i.test(url), isImg=/\.(png|jpg|jpeg|gif|webp)/i.test(url);
  const icon=isPdf?"📄":isImg?"🖼":"📁";
  const bg=isPdf?"#fdecea":isImg?"#e6f0fa":"#f5f5f5";
  return `<a class="doc-link" href="${url}" target="_blank">
    <div class="doc-icon" style="background:${bg}">${icon}</div>
    <span class="doc-lbl">${label}</span></a>`;
}

function populateFilters() {
  const branches = [...new Set(irItems.map(r=>r.branch).filter(Boolean))].sort();
  const categories = [...new Set(irItems.map(r=>r.category).filter(Boolean))].sort();
  const types = [...new Set(irItems.flatMap(r=>[r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4]).filter(Boolean))].sort();

  const bEl=document.getElementById("f-branch");
  branches.forEach(b=>{ const o=document.createElement("option"); o.value=b; o.textContent=b; bEl.appendChild(o); });

  const cEl=document.getElementById("f-category");
  categories.forEach(c=>{ const o=document.createElement("option"); o.value=c; o.textContent=c; cEl.appendChild(o); });

  const tEl=document.getElementById("f-type");
  types.forEach(t=>{ const o=document.createElement("option"); o.value=t; o.textContent=t; tEl.appendChild(o); });
}

function clearFilters() {
  ["f-branch","f-category","f-type","f-ap","f-hr","f-retain","f-deny","f-date-from","f-date-to","search"]
    .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=""; });
  renderList();
}

function renderList() {
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fb=document.getElementById("f-branch").value;
  const fc=document.getElementById("f-category").value;
  const ft=document.getElementById("f-type").value;
  const fap=document.getElementById("f-ap").value;
  const fhr=document.getElementById("f-hr").value;
  const fret=document.getElementById("f-retain").value;
  const fdeny=document.getElementById("f-deny").value;
  const fdfrom=document.getElementById("f-date-from").value;
  const fdto=document.getElementById("f-date-to").value;

  const filtered = irItems.filter(r => {
    if ((r.category||"").toLowerCase()==="background check denial") return false;
    if (q && ![(r.caseId||""),(r.branch||""),(r.subjectName||""),displayName(r)].some(s=>s.toLowerCase().includes(q))) return false;
    if (fb && r.branch!==fb) return false;
    if (fc && r.category!==fc) return false;
    if (ft && ![r.incidentType1,r.incidentType2,r.incidentType3,r.incidentType4].includes(ft)) return false;
    if (fap && r.apFollowUp!==fap) return false;
    if (fhr && r.hrRec!==fhr) return false;
    if (fret==="yes" && !(r.retainVideo||"").toLowerCase().includes("yes")) return false;
    if (fret==="no" && (r.retainVideo||"").toLowerCase().includes("yes")) return false;
    if (fdeny==="has" && !getLinkedDS(r).length) return false;
    if (fdeny==="none" && getLinkedDS(r).length) return false;
    if (fdfrom && r.date && r.date < fdfrom) return false;
    if (fdto && r.date && r.date > fdto) return false;
    return true;
  });

  const panel = document.getElementById("list-panel");
  if (!filtered.length) { panel.innerHTML='<div class="empty">No cases match your filters.</div>'; return; }

  panel.innerHTML = filtered.map(r => {
    const ds=getLinkedDS(r);
    return `<div class="list-item ${selectedId===r.id?'active':''}" onclick="selectItem('${r.id}')">
      <div class="item-name">${displayName(r)}</div>
      <div class="item-caseid">${r.caseId||r.pushableCaseId||r.id}</div>
      <div class="item-meta">
        <span><span class="lbl">Branch </span>${r.branch||"—"}</span>
        <span><span class="lbl">Date </span>${r.date||"—"}</span>
        <span><span class="lbl">Category </span>${r.category||"—"}</span>
        <span><span class="lbl">Type </span>${getIncidentTypes(r).substring(0,22)}</span>
        <span><span class="lbl">Ownership </span>${r.apFollowUp||"—"}</span>
        <span><span class="lbl">HR </span>${r.hrRec||"—"}</span>
        <span><span class="lbl">Video </span>${r.retainVideo||"—"}</span>
        <span><span class="lbl">DNS </span>${ds.length?ds[0].status||"Yes":"None"}</span>
      </div>
    </div>`;
  }).join("");
}

function selectItem(id) {
  selectedId=id;
  const r=irItems.find(x=>x.id===id);
  renderList();
  if (r) renderDetail(r);
}

async function updateColumn(itemId, boardId, columnId, value, type) {
  let colValue;
  if (type==="text") colValue=JSON.stringify(value);
  else if (type==="longtext") colValue=JSON.stringify({text:value});
  else if (type==="status") colValue=JSON.stringify({label:value});
  const mutation=`mutation{change_column_value(board_id:${boardId},item_id:${itemId},column_id:"${columnId}",value:${JSON.stringify(colValue)}){id}}`;
  try {
    const result=await gql(mutation);
    return !!result?.data?.change_column_value?.id;
  } catch(e) { return false; }
}

function showMsg(elId, success) {
  const el=document.getElementById(elId);
  if (!el) return;
  el.textContent=success?"✓ Saved to Monday":"✗ Save failed";
  el.className="save-msg "+(success?"ok":"err");
  setTimeout(()=>{ el.textContent=""; },3000);
}

async function saveApFindings(itemId) {
  const val = document.getElementById("edit-apFindings").value;
  const ok = await updateColumn(itemId, IR_BOARD, "long_text__1", val, "longtext");
  showMsg("msg-apFindings", ok);
  if (ok) { const item=irItems.find(x=>x.id===itemId); if(item) item.apFindings=val; }
}

async function saveOneDriveLink(itemId) {
  const val = document.getElementById("edit-oneDriveLink").value;
  const ok = await updateColumn(itemId, IR_BOARD, "text_mkvd8262", val, "text");
  showMsg("msg-oneDriveLink", ok);
  if (ok) {
    const item=irItems.find(x=>x.id===itemId);
    if(item) item.oneDriveLink=val;
    const openLink = document.querySelector('#edit-oneDriveLink + a');
    if (openLink && val) { openLink.href=val; openLink.style.display="inline"; }
  }
}

async function saveRetainVideo(itemId, val) {
  const ok = await updateColumn(itemId, IR_BOARD, "deny_service__", val, "status");
  if (ok) {
    const item=irItems.find(x=>x.id===itemId);
    if(item) { item.retainVideo=val; renderList(); }
  }
  const msg=document.createElement("span");
  msg.textContent=ok?"✓ Saved":"✗ Failed";
  msg.style.cssText=`font-size:11px;margin-left:8px;color:${ok?"#1a7a3f":"#c0392b"}`;
  const sel=document.getElementById("edit-retainVideo");
  if (sel) { sel.parentNode.appendChild(msg); setTimeout(()=>msg.remove(),2500); }
}

  const vrs=getLinkedVR(ir);
  const v=vrs[idx];
  if (!v) return;
  const fields=[
    {k:"agency",l:"Agency"},{k:"status",l:"Status"},{k:"assigned",l:"Assigned to"},
    {k:"priority",l:"Priority"},{k:"branch",l:"Branch"},{k:"incidentDate",l:"Incident date"},
    {k:"incidentTime",l:"Incident time"},{k:"submittedDate",l:"Submitted date"},
    {k:"submittedBy",l:"Submitted by"},
    {k:"requestNarrative",l:"Request narrative",long:true},
    {k:"supplement",l:"SSC supplement",long:true},
    {k:"leContact",l:"LE contact"},{k:"leEmail",l:"LE email"},{k:"lePhone",l:"LE phone"},
    {k:"reviewDecision",l:"Review decision"},{k:"dateCompleted",l:"Date completed"},
    {k:"incidentCategory",l:"Incident category"},{k:"location",l:"Location"}
  ];
  document.getElementById("vr-modal-content").innerHTML=`
    <div class="modal-hdr">
      <div><div class="modal-title">${v.agency||"Video Request"}</div>
      <div class="modal-sub">${v.branch||""} · ${v.incidentDate||""}</div></div>
      <button onclick="document.getElementById('vr-modal').style.display='none'">✕</button>
    </div>
    <div class="badges" style="margin-bottom:12px;"><span class="badge ${badgeCls(v.status)}">${v.status||""}</span></div>
    <div class="mfields">
      ${fields.map(f=>`<div class="mf ${f.long?'full':''}">
        <div class="mf-label">${f.label||f.l}</div>
        <div class="mf-val">${v[f.k]||"—"}</div>
      </div>`).join("")}
    </div>
    ${v.oneDriveLink&&v.oneDriveLink!=="—"?`<div style="margin-top:12px;">${docLink(v.oneDriveLink,"Video")}</div>`:""}`;
  document.getElementById("vr-modal").style.display="flex";
}

function closeModal(e) {
  if (e.target.id==="vr-modal") document.getElementById("vr-modal").style.display="none";
}

  h1{font-size:18px;color:#2d3a4a;margin-bottom:4px;}
  h2{font-size:10px;color:#2d3a4a;border-bottom:1px solid #2d3a4a;padding-bottom:3px;margin:14px 0 7px;text-transform:uppercase;letter-spacing:1px;}
  .g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 18px;}
  .f label{font-size:9px;color:#888;text-transform:uppercase;display:block;margin-bottom:1px;}
  .full{grid-column:1/-1;}.logo{font-size:20px;font-weight:800;color:#2d3a4a;letter-spacing:3px;}
  .sub{font-size:11px;color:#c0392b;letter-spacing:2px;margin-bottom:14px;}
  .narr{background:#f9f9f9;padding:10px;border-radius:4px;white-space:pre-wrap;font-size:12px;line-height:1.6;}
  @media print{body{margin:20px;}}</style></head><body>
  <div class="logo">RANGE ✛ USA</div><div class="sub">ASSET PROTECTION</div>
  <h1>${displayName(r)}</h1>
  <p style="color:#888;font-size:11px;margin-bottom:10px;">${r.caseId||r.id}</p>
  <h2>Findings</h2><div class="g">
  <div class="f full"><label>AP findings</label><p>${(r.apFindings||"—").replace(/\n/g,"<br/>")}</p></div>
  <div class="f full"><label>HR recommendation & findings</label><p>${getIRValue(r,"hrRec").replace(/\n/g,"<br/>")}</p></div>
  <div class="f full"><label>Interview narrative</label><p>${(r.interviewNarrative||"—").replace(/\n/g,"<br/>")}</p></div>
  </div>
  <h2>Overview</h2><div class="g">
  <div class="f"><label>Case ID</label><p>${r.caseId||r.id}</p></div>
  <div class="f"><label>Date</label><p>${r.date||"—"}</p></div>
  <div class="f"><label>Branch</label><p>${r.branch||"—"}</p></div>
  <div class="f"><label>District leader</label><p>${r.district||"—"}</p></div>
  <div class="f"><label>Submitted by</label><p>${r.submittedBy||"—"}</p></div>
  <div class="f"><label>Location</label><p>${r.location||"—"} ${r.specificLocation||""}</p></div>
  </div>
  <h2>Details</h2><div class="g">
  <div class="f"><label>Category</label><p>${r.category||"—"}</p></div>
  <div class="f"><label>Incident type</label><p>${getIncidentTypes(r)}</p></div>
  <div class="f"><label>Retain video</label><p>${r.retainVideo||"—"}</p></div>
  </div>
  <h2>Original narrative</h2><div class="narr">${getIRValue(r,"narrative").replace(/\n/g,"<br/>")}</div>
  <h2>Subject</h2><div class="g">
  <div class="f"><label>Name</label><p>${r.subjectName||"—"}</p></div>
  <div class="f"><label>Injuries</label><p>${r.injuries||"—"}</p></div>
  <div class="f"><label>Property damage</label><p>${r.propertyDamage||"—"}</p></div>
  </div>
  ${ds.length?`<h2>Deny Service</h2>${ds.map(d=>`<p><b>${d.subjectName||"Unknown"}</b> — ${d.status||""} — ${d.date||""}<br/>${d.narrative||""}</p>`).join("")}`:""}
  ${vrs.length?`<h2>Video Requests</h2>${vrs.map(v=>`<div style="border:1px solid #ddd;padding:8px;border-radius:4px;margin-bottom:8px;"><b>${v.agency||""}</b> · ${v.status||""} · ${v.branch||""}<br/><i>${v.requestNarrative||""}</i></div>`).join("")}`:""}
  <script>window.print();<\/script></body></html>`);
  win.document.close();
}

async function init() {
  try {
    document.getElementById("live-badge").textContent="● Loading…";
    const [ir,vr,ds] = await Promise.all([
      fetchBoard(IR_BOARD, IR_COLS),
      fetchBoard(VR_BOARD, VR_COLS),
      fetchBoard(DS_BOARD, DS_COLS)
    ]);
    irItems=ir; vrItems=vr; dsItems=ds;
    document.getElementById("live-badge").textContent=`● Live — ${irItems.length} cases`;
    populateFilters();
    renderList();
  } catch(e) {
    document.getElementById("list-panel").innerHTML=`<div class="err-msg">Error: ${e.message}</div>`;
    document.getElementById("live-badge").textContent="● Error";
  }
}

init();
</script>
</body>
</html>
